<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrandOS — Indian Marketing Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0b; --surface:#111114; --surface2:#1a1a1f; --surface3:#22222a;
  --border:#2a2a35; --border2:#353545;
  --accent:#ff6b2b; --accent2:#ff9f5a; --glow:rgba(255,107,43,0.15);
  --gold:#f5c842; --text:#f0eff5; --text2:#9998aa; --text3:#605f70;
  --green:#3dd68c; --red:#ff4d6a;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;}
.app{display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:260px;min-width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.logo-wrap{padding:22px 20px 18px;border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-0.5px;}
.logo span{color:var(--accent);}
.logo-sub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:3px;text-transform:uppercase;letter-spacing:.06em;}
.steps{flex:1;overflow-y:auto;padding:10px 0;}
.steps::-webkit-scrollbar{width:3px;}
.steps::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.si{display:flex;align-items:center;gap:11px;padding:9px 18px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;}
.si:hover{background:var(--surface2);}
.si.active{background:var(--glow);border-left-color:var(--accent);}
.snum{width:24px;height:24px;border-radius:50%;background:var(--surface3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);flex-shrink:0;transition:all .2s;}
.si.active .snum{background:var(--accent);color:#fff;border-color:var(--accent);}
.si.done .snum{background:var(--green);color:#000;border-color:var(--green);}
.slabel{font-size:12.5px;color:var(--text2);line-height:1.3;}
.si.active .slabel{color:var(--text);font-weight:500;}
.sidebar-foot{padding:14px 18px;border-top:1px solid var(--border);flex-shrink:0;}
.api-dot-row{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{padding:14px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);flex-shrink:0;}
.topbar-left{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text2);}
.topbar-left b{color:var(--accent);}
.sbadge{font-family:'DM Mono',monospace;font-size:11px;padding:4px 10px;border-radius:20px;background:var(--surface3);border:1px solid var(--border2);color:var(--text3);}
.sbadge.on{color:var(--gold);border-color:rgba(245,200,66,.3);background:rgba(245,200,66,.08);}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:28px 32px;display:flex;flex-direction:column;gap:22px;min-height:0;}
.content::-webkit-scrollbar{width:5px;}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* BOTTOM NAV */
.botnav{padding:14px 28px;border-top:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.navinfo{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:11px 22px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:500;cursor:pointer;border:none;transition:all .15s;}
.btn-p{background:var(--accent);color:#fff;}
.btn-p:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 4px 18px rgba(255,107,43,.3);}
.btn-p:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-g{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);}
.btn-g:hover{border-color:var(--border);color:var(--text);}

/* WELCOME */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:65vh;text-align:center;gap:18px;padding:20px;}
.wicon{width:68px;height:68px;background:var(--glow);border:1px solid rgba(255,107,43,.3);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:4px;}
.welcome h1{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;line-height:1.2;}
.welcome h1 em{color:var(--accent);font-style:normal;}
.welcome p{font-size:14.5px;color:var(--text2);max-width:460px;line-height:1.75;}
.wtags{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.tag{font-family:'DM Mono',monospace;font-size:11px;padding:4px 11px;border-radius:20px;background:var(--surface2);border:1px solid var(--border2);color:var(--text3);}
.api-box{width:100%;max-width:440px;background:var(--surface2);border:1px solid rgba(245,200,66,.25);border-radius:13px;padding:22px;margin-top:4px;}
.api-box h3{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--gold);margin-bottom:7px;}
.api-box p{font-size:13px;color:var(--text2);margin-bottom:15px;line-height:1.6;}
.api-box a{color:var(--accent);text-decoration:none;}
.api-box a:hover{text-decoration:underline;}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;}
.card-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:14px;}
.card-badge{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);background:var(--glow);border:1px solid rgba(255,107,43,.25);padding:4px 9px;border-radius:7px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.card-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;}
.card-desc{font-size:13px;color:var(--text2);margin-top:3px;line-height:1.55;}
.card-body{padding:22px;}

/* FORM */
label{display:block;font-size:13px;color:var(--text2);margin-bottom:7px;font-weight:500;}
label span{color:var(--accent);}
input[type=text],textarea,select{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:9px;padding:11px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13.5px;outline:none;transition:border-color .2s,box-shadow .2s;resize:vertical;}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow);}
select option{background:var(--surface2);}
.frow{margin-bottom:18px;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}

/* CONTEXT BAR */
.ctx{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:16px 20px;}
.ctx h4{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text3);margin-bottom:11px;text-transform:uppercase;letter-spacing:.06em;}
.ctx-row{display:flex;gap:10px;margin-bottom:8px;font-size:13px;}
.ctx-k{color:var(--text3);font-family:'DM Mono',monospace;min-width:110px;}
.ctx-v{color:var(--text);}

/* RESPONSE */
.rbox{background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:22px;margin-top:18px;}
.rhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.rlabel{font-family:'DM Mono',monospace;font-size:11px;color:var(--green);display:flex;align-items:center;gap:7px;text-transform:uppercase;letter-spacing:.07em;}
.rlabel::before{content:'';display:block;width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite;}
.rcontent{font-size:13.5px;line-height:1.9;color:var(--text);word-break:break-word;overflow-wrap:break-word;}
.rcontent h2{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;color:var(--accent);margin:0 0 14px;}
.rcontent h3{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);margin:22px 0 9px;padding-top:14px;border-top:1px solid var(--border);}
.rcontent h4{font-family:'Syne',sans-serif;font-size:13.5px;font-weight:700;color:var(--accent2);margin:16px 0 7px;}
.rcontent strong{color:var(--accent2);font-weight:600;}
.rcontent em{color:var(--gold);font-style:normal;}
.rcontent ul{padding-left:18px;margin:8px 0;}
.rcontent li{margin:5px 0;}
.rcontent p{margin:9px 0;}
.rcontent table{width:100%;border-collapse:collapse;margin:12px 0;font-size:12.5px;}
.rcontent th{background:var(--surface3);padding:8px 12px;text-align:left;font-weight:600;border:1px solid var(--border2);}
.rcontent td{padding:7px 12px;border:1px solid var(--border2);color:var(--text2);}
.rcontent hr{border:none;border-top:1px solid var(--border);margin:18px 0;}

/* LOADING */
.loading{display:flex;align-items:center;gap:14px;padding:18px 22px;background:var(--surface2);border:1px solid var(--border);border-radius:11px;margin-top:18px;}
.spin{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-size:13.5px;color:var(--text2);}
.lsub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:3px;}

/* CHIPS */
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;}
.chip{font-size:11px;font-family:'DM Mono',monospace;padding:4px 10px;border-radius:6px;background:var(--surface3);border:1px solid var(--border2);color:var(--text3);}
.chip.g{color:var(--green);border-color:rgba(61,214,140,.2);background:rgba(61,214,140,.07);}
.chip.o{color:var(--accent);border-color:rgba(255,107,43,.25);background:var(--glow);}
.chip.gld{color:var(--gold);border-color:rgba(245,200,66,.2);background:rgba(245,200,66,.07);}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:12px 18px;font-size:13px;color:var(--text);box-shadow:0 8px 28px rgba(0,0,0,.4);z-index:999;transform:translateY(16px);opacity:0;transition:all .25s;max-width:300px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok{border-color:rgba(61,214,140,.35);}
.toast.err{border-color:rgba(255,77,106,.35);color:var(--red);}

@media print{.sidebar,.topbar,.botnav,.btn,.api-box{display:none!important;}.main{width:100%;}.content{padding:16px;}body{background:#fff;color:#000;}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo-wrap">
      <div class="logo">Brand<span>OS</span></div>
      <div class="logo-sub">Indian Marketing Intelligence</div>
    </div>
    <div class="steps" id="sidebarSteps"></div>
    <div class="sidebar-foot">
      <div class="api-dot-row"><div class="dot"></div><span>Gemini 2.0 Flash Lite</span></div>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div class="topbar-left">Step <b id="tStep">—</b> · <span id="tName">Welcome</span></div>
      <div class="sbadge" id="tBadge">Stage not set</div>
    </div>
    <div class="content" id="content"></div>
    <div class="botnav">
      <button class="btn btn-g" id="btnPrev" onclick="nav(-1)">← Prev</button>
      <div class="navinfo" id="navInfo">— of 13</div>
      <button class="btn btn-g" id="btnNext" onclick="nav(1)">Next →</button>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────────
const S = {
  key: '',
  step: 0,
  done: new Set(),
  brand: {},
  resp: {},    // step responses {n: {out, inp}}
  stage: ''
};

const STEPS = [
  {id:1,  label:'Brand Brief Intake'},
  {id:2,  label:'Consumer Persona Builder'},
  {id:3,  label:'MarketFit Score'},
  {id:4,  label:'Market Sizing TAM/SAM/SOM'},
  {id:5,  label:'Competitor Intelligence'},
  {id:6,  label:'Framework Battery'},
  {id:7,  label:'Challenger Positioning'},
  {id:8,  label:'PriceSense — Pricing'},
  {id:9,  label:'GTM Sequencer 90 Days'},
  {id:10, label:'Budget Allocator'},
  {id:11, label:'Risk Flags'},
  {id:12, label:'Open Q&A'},
  {id:13, label:'Final Consultancy Report'},
];

// ── GEMINI API ─────────────────────────────────────────────────────────────────
async function gemini(userMsg) {
  // Build contents array: inject system prompt as first user turn + model ack
  // then prior conversation history, then current message
  const contents = [];

  // System context as first exchange (Gemini REST doesn't support system role cleanly in all versions)
  contents.push({ role:'user', parts:[{text: 'You are BrandOS. Here are your instructions:\n\n' + SYSPROMPT + '\n\nAcknowledge briefly.'}] });
  contents.push({ role:'model', parts:[{text: 'Understood. I am BrandOS, your Indian marketing intelligence system. Ready to deliver elite go-to-market strategy.'}] });

  // Add prior steps as conversation history
  for (let i = 1; i <= 13; i++) {
    if (S.resp[i]) {
      contents.push({ role:'user',  parts:[{text: S.resp[i].inp}] });
      contents.push({ role:'model', parts:[{text: S.resp[i].out}] });
    }
  }

  // Current message
  contents.push({ role:'user', parts:[{text: userMsg}] });

  const body = {
    contents,
    generationConfig: { temperature: 0.85, maxOutputTokens: 4096 }
  };

  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=${S.key}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    let msg = `HTTP ${res.status}`;
    try { const e = await res.json(); msg = e.error?.message || msg; } catch(x){}
    throw new Error(msg);
  }

  const data = await res.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error('Empty response from Gemini');
  return text;
}

// ── SYSTEM PROMPT ──────────────────────────────────────────────────────────────
const SYSPROMPT = `You are BrandOS — an elite Indian marketing intelligence system. Think like a senior partner at a top Indian consulting firm combined with a D2C brand builder who has spent 15 years selling to Indian consumers across all 28 states.

INDIA INTELLIGENCE LAYER (always active):
- SEC tiers: A1/A2 (HHI >10L), B1/B2 (5-10L), C (2.5-5L), D/E (below 2.5L)
- Regional behaviour: North (aspirational, value-for-money), South (quality-first, brand loyal), West (trend-driven, early adopters), East (price-sensitive, relationship-driven)
- City tiers: Tier 1 (8 metros), Tier 2 (50 cities), Tier 3/rural (80% population) — channel strategy changes completely across tiers
- Cultural purchase triggers: Diwali, Eid, Navratri, Durga Puja, Onam, Pongal, Baisakhi, wedding season (Oct-Feb, Apr-May), Akshaya Tritiya, Dhanteras
- Channels: Kirana stores (12M stores, 85% FMCG), Modern Trade (DMart, Big Bazaar), Quick Commerce (Zepto, Blinkit, Swiggy Instamart), D2C (Instagram, Amazon, own site), WhatsApp Commerce
- Price psychology: Rs.99/199/499/999 are anchor points. EMI at Rs.500-999/month unlocks durables. "Value pack" beats "economy". Sachet strategy for trial.
- 850M internet users, 600M smartphone users — but rural India uses voice search in Hindi/regional languages

BRAND STAGES:
- Stage 1: Pre-revenue idea validation
- Stage 2: 0-50L annual revenue, early PMF signals  
- Stage 3: 50L-100Cr+, scaling or repositioning

OUTPUT RULES:
1. Always India-specific — never generic global advice
2. Name actual Indian brands, platforms, distributors, influencers
3. Give specific numbers — percentages, price points, budgets
4. Think in rupees
5. Call out what won't work in India even if it works globally
6. Be direct and opinionated — this replaces a Rs.10-40 lakh engagement
7. Use markdown: ## headers, **bold**, bullet points, tables where useful
8. Fill every framework completely — no vague placeholders
9. End every response with 2-3 "Brutal Truths" the founder needs to hear`;

// ── STEP PROMPTS ───────────────────────────────────────────────────────────────
function prompt(n, d) {
  const b = S.brand;
  const ps = {
    1: `STEP 1 — BRAND BRIEF INTAKE

Analyze this brand and provide:
## 1. Brand Snapshot
What this brand actually is — 2-3 sentences of clarity.

## 2. The Real Opportunity  
What specific Indian consumer need does this fill? Why now?

## 3. Initial Positioning Hypothesis
Your first instinct on where this brand should sit in the consumer's mind.

## 4. Three Critical Questions
Things you need answered before full strategy can begin.

## 5. Stage Assessment
Confirm the brand stage and what strategic approach that unlocks.

## 6. Brutal Truths
2-3 hard realities about this category the founder must accept.

---
Brand: ${b.brand}
Product: ${b.product}
Stage: ${b.stage}
Location: ${b.location}
Revenue: ${b.revenue || 'Not disclosed'}
Target Customer: ${b.target}
Current Channels: ${b.channels}
USP: ${b.usp}
Budget: ${b.budget || 'Not disclosed'}
Founder Notes: ${b.notes || 'None'}`,

    2: `STEP 2 — INDIAN CONSUMER PERSONA BUILDER

For brand: ${b.brand} (${b.product})

Build 3 distinct Indian consumer personas. For each:
- **Name, Age, City, SEC Tier**
- **Daily Life** — how does this product fit into their actual day?
- **Purchase Triggers** — what makes them buy? What blocks them?
- **Channel Preference** — kirana/DMart/Instagram/Zepto/WhatsApp?
- **Price Sensitivity** — exact price points that unlock vs block purchase
- **Cultural Context** — festivals, family influence, reference groups
- **Media Touchpoints** — YouTube? Instagram? TV? Regional language?
- **The Non-Obvious Insight** — one thing about this person competitors miss

Make them real Indians from real cities with real aspirations. Not demographic boxes.
${d.extra || ''}`,

    3: `STEP 3 — MARKETFIT SCORE

Score ${b.brand}'s product-market fit on 100 points across 5 dimensions:

**1. Problem Severity (20 pts)** — How acutely painful is the problem in India?
**2. India Market Readiness (20 pts)** — Is Indian consumer behavior ready for this?
**3. Competitive White Space (20 pts)** — How uncrowded is the position?
**4. Unit Economics Viability (20 pts)** — Can this work at Indian price points?
**5. Distribution Feasibility (20 pts)** — Can you realistically reach buyers?

For each: score X/20, reasoning, and what would change the score.

Then give: **Total MarketFit Score: XX/100** — Red (<50) / Yellow (50-70) / Green (70+) verdict with specific action items.
${d.extra || ''}`,

    4: `STEP 4 — MARKET SIZING (TAM/SAM/SOM)

For ${b.brand} in India:

## TAM — Total Addressable Market
- Define the total Indian market for this category
- Calculate using BOTH bottom-up and top-down methods
- Show your math in rupees (crore/billion)
- CAGR and growth trajectory

## SAM — Serviceable Addressable Market  
- Which segments can ${b.brand} realistically serve given price, geography, channels?
- 3-year SAM projection

## SOM — Serviceable Obtainable Market
- Year 1, Year 3, Year 5 realistic targets
- What % market share = profitability?
- What does it take to become the #1 brand in this segment?

## Market Dynamics
- Top 3 growth drivers
- Top 3 headwinds  
- Regulatory landscape
- Where is the real money in this market?
${d.extra || ''}`,

    5: `STEP 5 — COMPETITOR INTELLIGENCE MAP

For ${b.brand}:

## Tier 1: Direct Competitors (same product, same customer)
For each: positioning, price points, distribution strength, digital presence, weaknesses, estimated revenue

## Tier 2: Indirect Competitors (different solution, same need)
Same analysis

## Tier 3: Future Threats (who will enter this space)

## Competitive Matrix
Create a comparison table: Brand | Price | Quality | Distribution | Brand Equity | Digital | Overall Score

## The White Space
Where is the unclaimed position? What does no brand own?

## Their Biggest Mistakes
What are competitors doing wrong that ${b.brand} can exploit RIGHT NOW?
${d.extra || ''}`,

    6: `STEP 6 — FRAMEWORK BATTERY (10 Frameworks)

Apply all 10 to ${b.brand}. Fill each completely — no vague placeholders:

## 1. SWOT Analysis
4-5 India-specific points per quadrant

## 2. PESTLE Analysis  
Political/Regulatory, Economic (India macro), Social (demographics), Technology (Digital India), Legal (GST/FSSAI/BIS), Environmental

## 3. STP Analysis
Segmentation → Targeting → Positioning statement

## 4. 7Ps Marketing Mix
Product, Price, Place, Promotion, People, Process, Physical Evidence — all India-specific

## 5. AIDA Model
How to move Indian consumers: Awareness → Interest → Desire → Action (with specific tactics)

## 6. Porter's Five Forces
Rate each High/Medium/Low with India context and implication

## 7. Blue Ocean Strategy
Eliminate / Reduce / Raise / Create grid vs competition

## 8. Ansoff Matrix
Which quadrant is the priority and exact rationale

## 9. BCG Matrix
Where does this product sit and what it implies for investment

## 10. Jobs To Be Done
The real functional + emotional + social job Indian consumers hire this for
${d.extra || ''}`,

    7: `STEP 7 — CHALLENGER POSITIONING ADVISOR

For ${b.brand} challenging incumbents in its category:

## The Incumbent's Problem
What does the market leader get wrong? What narrative do they own? What's unclaimed?

## Three Challenger Positions
Each with a name, tagline, and rationale:
1. **[Position Name]** — targeting customer who is frustrated by [specific thing]
2. **[Position Name]** — the values/mission-based play
3. **[Position Name]** — the performance/results play

## Recommended Position
Which one to own, why, and the final positioning statement.

## Proof Points
What evidence makes this position credible to a skeptical Indian consumer?

## The Villain
What concept/habit/status quo is ${b.brand} fighting against? (not a competitor by name)

## Communication Rules
5 rules for how this brand must always communicate

## Never Say / Never Be
3 associations this brand must never have
${d.extra || ''}`,

    8: `STEP 8 — PRICESENSE (PRICING STRATEGY)

For ${b.brand}:

## Price Point Analysis
Current/planned price, where it sits in Indian consumer's mental map, psychological anchor analysis

## Pricing Strategy
Choose and justify one: Penetration / Skimming / Value-Based / Competitive / Premium

## Pack Architecture
Design 3-4 pack sizes/variants with prices that maximize reach AND margin

## Price-Value Perception
How to make the price FEEL right across SEC A, B, and C tiers

## Channel-Wise Pricing
- MRP on pack
- Kirana trade margin
- Modern Trade (DMart etc)
- Quick Commerce (Blinkit/Zepto)
- D2C website
- Why each differs

## Promotions That Work

function runStep1() {

    target: v('f6'), channels: v('f7'), usp: v('f8'),
    budget: v('f9'), notes: v('f10')
  };

  execute(1, prompt(1, {}));

function runQ() {
  const q = v('fq');
  if (!q) { toast('Type your question', 'err'); return; }

function runGeneric(n, d) {
  if (!S.brand.brand && n !== 1) { toast('Complete Step 1 first', 'err'); return; }

function v(id) { const e = document.getElementById(id); return e ? e.value.trim() : ''; }

// ── EXECUTE ────────────────────────────────────────────────────────────────────
async function execute(n, p) {
  if (!S.key) { toast('No API key — return to welcome', 'err'); return; }

  const btn = document.getElementById('runBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Analyzing...'; }

  // Show loading spinner
  const c = document.getElementById('content');
  let loader = document.getElementById('loader');
  if (!loader) {
    loader = document.createElement('div');
    loader.id = 'loader';
    loader.className = 'loading';
    loader.innerHTML = `<div class="spin"></div><div><div class="ltxt">BrandOS is analyzing...</div><div class="lsub">Applying Indian market intelligence</div></div>`;
    c.appendChild(loader);
  }
  c.scrollTop = c.scrollHeight;

  try {
    const out = await gemini(p);
    S.resp[n] = { inp: p, out };
    S.done.add(n);
    loader.remove();
    renderSidebar();
    goStep(n);
    // Scroll to response
    setTimeout(() => {
      const rb = document.querySelector('.rbox');
      if (rb) rb.scrollIntoView({behavior:'smooth', block:'start'});
    }, 100);
    toast('Step ' + n + ' complete!', 'ok');
  } catch(err) {
    loader.remove();
    if (btn) { btn.disabled = false; btn.textContent = 'Try Again →'; }
    toast('Error: ' + err.message, 'err');
    // Show error in content too
    const errDiv = document.createElement('div');
    errDiv.style.cssText = 'background:rgba(255,77,106,.1);border:1px solid rgba(255,77,106,.3);border-radius:10px;padding:18px;margin-top:16px;font-size:13.5px;color:var(--red);';
    errDiv.innerHTML = '<strong>API Error:</strong> ' + err.message + '<br><br><span style="color:var(--text2);font-size:12px;">Check your API key is valid and has Gemini API enabled at aistudio.google.com</span>';
    c.appendChild(errDiv);
  }
}

// ── MARKDOWN RENDERER ─────────────────────────────────────────────────────────
function md(t) {
  // Escape HTML first
  t = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Headers
  t = t.replace(/^#### (.+)$/gm,'<h4>$1</h4>');
  t = t.replace(/^### (.+)$/gm,'<h4>$1</h4>');
  t = t.replace(/^## (.+)$/gm,'<h3>$1</h3>');
  t = t.replace(/^# (.+)$/gm,'<h2>$1</h2>');
  // Bold / italic
  t = t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g,'<em>$1</em>');
  // HR
  t = t.replace(/^---+$/gm,'<hr>');
  // Tables (basic)
  t = t.replace(/^\|(.+)\|$/gm, (line) => {
    if (line.replace(/[\s\-\|]/g,'') === '') return '<tr class="thead-sep"></tr>';
    const cells = line.split('|').filter((_,i,a)=>i>0&&i<a.length-1);
    return '<tr>' + cells.map(c=>`<td>${c.trim()}</td>`).join('') + '</tr>';
  });
  t = t.replace(/(<tr>.*<\/tr>\n?)+/gs, m => `<table>${m}</table>`);
  // Lists
  t = t.replace(/^- (.+)$/gm,'<li>$1</li>');
  t = t.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  t = t.replace(/(<li>[\s\S]*?<\/li>)(\n(?!<li>)|$)/g,'<ul>$1</ul>$2');
  // Paragraphs
  t = t.replace(/\n\n/g,'</p><p>');
  t = t.replace(/\n/g,'<br>');
  return '<p>' + t + '</p>';
}

// ── TOAST ──────────────────────────────────────────────────────────────────────
function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(()=>{ t.className='toast'; }, 3500);
}
