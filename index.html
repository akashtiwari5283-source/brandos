<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrandOS — Indian Marketing Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0b; --surface:#111114; --surface2:#1a1a1f; --surface3:#22222a;
  --border:#2a2a35; --border2:#353545;
  --accent:#ff6b2b; --accent2:#ff9f5a; --glow:rgba(255,107,43,0.15);
  --gold:#f5c842; --text:#f0eff5; --text2:#9998aa; --text3:#605f70;
  --green:#3dd68c; --red:#ff4d6a;
  --violet:#a78bfa; --violet-glow:rgba(167,139,250,0.12);
  --cyan:#22d3ee;   --cyan-glow:rgba(34,211,238,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;}
.app{display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:260px;min-width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.logo-wrap{padding:22px 20px 18px;border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-0.5px;}
.logo span{color:var(--accent);}
.logo-sub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:3px;text-transform:uppercase;letter-spacing:.06em;}
.steps{flex:1;overflow-y:auto;padding:10px 0;}
.steps::-webkit-scrollbar{width:3px;}
.steps::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.si{display:flex;align-items:center;gap:11px;padding:9px 18px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;}
.si:hover{background:var(--surface2);}
.si.active{background:var(--glow);border-left-color:var(--accent);}
.snum{width:24px;height:24px;border-radius:50%;background:var(--surface3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);flex-shrink:0;transition:all .2s;}
.si.active .snum{background:var(--accent);color:#fff;border-color:var(--accent);}
.si.done .snum{background:var(--green);color:#000;border-color:var(--green);}
.slabel{font-size:12.5px;color:var(--text2);line-height:1.3;}
.si.active .slabel{color:var(--text);font-weight:500;}
.sidebar-foot{padding:14px 18px;border-top:1px solid var(--border);flex-shrink:0;}
.api-dot-row{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{padding:14px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);flex-shrink:0;}
.topbar-left{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text2);}
.topbar-left b{color:var(--accent);}
.sbadge{font-family:'DM Mono',monospace;font-size:11px;padding:4px 10px;border-radius:20px;background:var(--surface3);border:1px solid var(--border2);color:var(--text3);}
.sbadge.on{color:var(--gold);border-color:rgba(245,200,66,.3);background:rgba(245,200,66,.08);}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:28px 32px;display:flex;flex-direction:column;gap:22px;min-height:0;}
.content::-webkit-scrollbar{width:5px;}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* BOTTOM NAV */
.botnav{padding:14px 28px;border-top:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.navinfo{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:11px 22px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:500;cursor:pointer;border:none;transition:all .15s;}
.btn-p{background:var(--accent);color:#fff;}
.btn-p:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 4px 18px rgba(255,107,43,.3);}
.btn-p:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-g{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);}
.btn-g:hover{border-color:var(--border);color:var(--text);}

/* WELCOME */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:65vh;text-align:center;gap:18px;padding:20px;}
.wicon{width:68px;height:68px;background:var(--glow);border:1px solid rgba(255,107,43,.3);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:4px;}
.welcome h1{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;line-height:1.2;}
.welcome h1 em{color:var(--accent);font-style:normal;}
.welcome p{font-size:14.5px;color:var(--text2);max-width:460px;line-height:1.75;}
.wtags{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.tag{font-family:'DM Mono',monospace;font-size:11px;padding:4px 11px;border-radius:20px;background:var(--surface2);border:1px solid var(--border2);color:var(--text3);}
.api-box{width:100%;max-width:440px;background:var(--surface2);border:1px solid rgba(245,200,66,.25);border-radius:13px;padding:22px;margin-top:4px;}
.api-box h3{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--gold);margin-bottom:7px;}
.api-box p{font-size:13px;color:var(--text2);margin-bottom:15px;line-height:1.6;}
.api-box a{color:var(--accent);text-decoration:none;}
.api-box a:hover{text-decoration:underline;}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;}
.card-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:14px;}
.card-badge{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);background:var(--glow);border:1px solid rgba(255,107,43,.25);padding:4px 9px;border-radius:7px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.card-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;}
.card-desc{font-size:13px;color:var(--text2);margin-top:3px;line-height:1.55;}
.card-body{padding:22px;}

/* FORM */
label{display:block;font-size:13px;color:var(--text2);margin-bottom:7px;font-weight:500;}
label span{color:var(--accent);}
input[type=text],textarea,select{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:9px;padding:11px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13.5px;outline:none;transition:border-color .2s,box-shadow .2s;resize:vertical;}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow);}
select option{background:var(--surface2);}
.frow{margin-bottom:18px;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}

/* CONTEXT BAR */
.ctx{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:16px 20px;}
.ctx h4{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text3);margin-bottom:11px;text-transform:uppercase;letter-spacing:.06em;}
.ctx-row{display:flex;gap:10px;margin-bottom:8px;font-size:13px;}
.ctx-k{color:var(--text3);font-family:'DM Mono',monospace;min-width:110px;}
.ctx-v{color:var(--text);}

/* RESPONSE */
.rbox{background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:22px;margin-top:18px;}
.rhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.rlabel{font-family:'DM Mono',monospace;font-size:11px;color:var(--green);display:flex;align-items:center;gap:7px;text-transform:uppercase;letter-spacing:.07em;}
.rlabel::before{content:'';display:block;width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite;}
.rcontent{font-size:13.5px;line-height:1.9;color:var(--text);word-break:break-word;overflow-wrap:break-word;}
.rcontent h2{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;color:var(--accent);margin:0 0 14px;}
.rcontent h3{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);margin:22px 0 9px;padding-top:14px;border-top:1px solid var(--border);}
.rcontent h4{font-family:'Syne',sans-serif;font-size:13.5px;font-weight:700;color:var(--accent2);margin:16px 0 7px;}
.rcontent strong{color:var(--accent2);font-weight:600;}
.rcontent em{color:var(--gold);font-style:normal;}
.rcontent ul{padding-left:18px;margin:8px 0;}
.rcontent li{margin:5px 0;}
.rcontent p{margin:9px 0;}
.rcontent table{width:100%;border-collapse:collapse;margin:12px 0;font-size:12.5px;}
.rcontent th{background:var(--surface3);padding:8px 12px;text-align:left;font-weight:600;border:1px solid var(--border2);}
.rcontent td{padding:7px 12px;border:1px solid var(--border2);color:var(--text2);}
.rcontent hr{border:none;border-top:1px solid var(--border);margin:18px 0;}

/* LOADING */
.loading{display:flex;align-items:center;gap:14px;padding:18px 22px;background:var(--surface2);border:1px solid var(--border);border-radius:11px;margin-top:18px;}
.spin{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-size:13.5px;color:var(--text2);}
.lsub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:3px;}

/* CHIPS */
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;}
.chip{font-size:11px;font-family:'DM Mono',monospace;padding:4px 10px;border-radius:6px;background:var(--surface3);border:1px solid var(--border2);color:var(--text3);}
.chip.g{color:var(--green);border-color:rgba(61,214,140,.2);background:rgba(61,214,140,.07);}
.chip.o{color:var(--accent);border-color:rgba(255,107,43,.25);background:var(--glow);}
.chip.gld{color:var(--gold);border-color:rgba(245,200,66,.2);background:rgba(245,200,66,.07);}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:12px 18px;font-size:13px;color:var(--text);box-shadow:0 8px 28px rgba(0,0,0,.4);z-index:999;transform:translateY(16px);opacity:0;transition:all .25s;max-width:300px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok{border-color:rgba(61,214,140,.35);}
.toast.err{border-color:rgba(255,77,106,.35);color:var(--red);}

/* FINANCIAL MODEL */
.fin-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
.fin-card{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:14px 16px;}
.fin-card-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.fin-card-icon{font-size:16px;}
.fin-card-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--violet);text-transform:uppercase;letter-spacing:.05em;}
.fin-metric{display:flex;flex-direction:column;margin-bottom:8px;}
.fin-label{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:3px;}
.fin-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--text);}
.fin-val.green{color:var(--green);}
.fin-val.red{color:var(--red);}
.fin-val.gold{color:var(--gold);}
.fin-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12.5px;}
.fin-row:last-child{border-bottom:none;}
.fin-row-k{color:var(--text2);}
.fin-row-v{font-family:'DM Mono',monospace;color:var(--text);}
.fin-row-v.pos{color:var(--green);}
.fin-row-v.neg{color:var(--red);}
.fin-section-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--violet);margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid rgba(167,139,250,.2);}
.fin-slider-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.fin-slider-label{font-size:12px;color:var(--text2);min-width:160px;}
.fin-slider-val{font-family:'DM Mono',monospace;font-size:12px;color:var(--violet);min-width:60px;text-align:right;}
input[type=range]{flex:1;accent-color:var(--violet);cursor:pointer;height:4px;}
.fin-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.fin-tab{font-family:'DM Mono',monospace;font-size:11px;padding:5px 12px;border-radius:7px;border:1px solid var(--border2);color:var(--text3);cursor:pointer;transition:all .15s;}
.fin-tab.active{color:var(--violet);border-color:rgba(167,139,250,.35);background:var(--violet-glow);}
.fin-tab:hover{color:var(--text2);}
.waterfall-bar{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.wb-label{font-size:11.5px;color:var(--text2);min-width:130px;text-align:right;}
.wb-bar-wrap{flex:1;height:22px;background:var(--surface3);border-radius:4px;overflow:hidden;position:relative;}
.wb-bar-fill{height:100%;border-radius:4px;transition:width .4s cubic-bezier(.4,0,.2,1);}
.wb-val{font-family:'DM Mono',monospace;font-size:11px;min-width:70px;color:var(--text);}
.scenario-btns{display:flex;gap:8px;margin-bottom:18px;}
.scen-btn{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);text-align:center;transition:all .15s;}
.scen-btn.active.bear{color:var(--red);border-color:rgba(255,77,106,.3);background:rgba(255,77,106,.07);}
.scen-btn.active.base{color:var(--green);border-color:rgba(61,214,140,.3);background:rgba(61,214,140,.07);}
.scen-btn.active.bull{color:var(--gold);border-color:rgba(245,200,66,.3);background:rgba(245,200,66,.07);}

/* PRODUCT RESEARCH */
.res-tool-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.res-tool-card{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:14px;cursor:pointer;transition:all .18s;}
.res-tool-card:hover{border-color:var(--cyan);background:var(--cyan-glow);}
.res-tool-card.active{border-color:var(--cyan);background:var(--cyan-glow);}
.res-tc-icon{font-size:22px;margin-bottom:8px;}
.res-tc-name{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--cyan);margin-bottom:4px;}
.res-tc-desc{font-size:11px;color:var(--text3);line-height:1.5;}
.insight-tag{display:inline-block;font-family:'DM Mono',monospace;font-size:10.5px;padding:3px 9px;border-radius:12px;margin:3px 3px 3px 0;}
.insight-tag.pain{background:rgba(255,77,106,.1);border:1px solid rgba(255,77,106,.2);color:var(--red);}
.insight-tag.desire{background:rgba(61,214,140,.1);border:1px solid rgba(61,214,140,.2);color:var(--green);}
.insight-tag.gap{background:rgba(34,211,238,.1);border:1px solid rgba(34,211,238,.2);color:var(--cyan);}
.insight-tag.lang{background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.2);color:var(--gold);}
.res-paste-area{width:100%;min-height:120px;background:var(--surface3);border:1px solid var(--border2);border-radius:8px;padding:12px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);resize:vertical;outline:none;transition:border-color .15s;}
.res-paste-area:focus{border-color:var(--cyan);}
.signal-row{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.signal-row:last-child{border-bottom:none;}
.signal-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.signal-body{flex:1;}
.signal-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px;}
.signal-sub{font-size:11.5px;color:var(--text3);line-height:1.5;}
.signal-strength{font-family:'DM Mono',monospace;font-size:10px;padding:2px 7px;border-radius:8px;flex-shrink:0;margin-top:2px;}
.signal-strength.high{background:rgba(61,214,140,.12);color:var(--green);}
.signal-strength.med{background:rgba(245,200,66,.12);color:var(--gold);}
.signal-strength.low{background:rgba(255,77,106,.12);color:var(--red);}
.kano-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.kano-feat{flex:1;font-size:13px;color:var(--text);}
.kano-cat{font-family:'DM Mono',monospace;font-size:11px;padding:3px 9px;border-radius:8px;}
.kano-cat.must{background:rgba(255,77,106,.12);color:var(--red);}
.kano-cat.perf{background:rgba(61,214,140,.12);color:var(--green);}
.kano-cat.del{background:rgba(34,211,238,.12);color:var(--cyan);}
.kano-cat.ind{background:rgba(96,95,112,.15);color:var(--text3);}
.res-section{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--cyan);margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid rgba(34,211,238,.18);}
.gap-card{background:var(--surface3);border-left:3px solid var(--cyan);border-radius:0 8px 8px 0;padding:12px 16px;margin-bottom:10px;}
.gap-card-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;}
.gap-card-body{font-size:12.5px;color:var(--text2);line-height:1.6;}
.pmf-meter{height:10px;background:var(--surface3);border-radius:5px;overflow:hidden;margin:6px 0;}
.pmf-fill{height:100%;border-radius:5px;transition:width .5s cubic-bezier(.4,0,.2,1);}

@media(max-width:900px){.res-tool-grid{grid-template-columns:1fr 1fr;}}

@media print{.sidebar,.topbar,.botnav,.btn,.api-box{display:none!important;}.main{width:100%;}.content{padding:16px;}body{background:#fff;color:#000;}}

/* MODE SWITCHER */
.mode-tabs{display:flex;gap:0;padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.mtab{flex:1;padding:7px 6px;text-align:center;font-family:'DM Mono',monospace;font-size:10px;border-radius:7px;cursor:pointer;color:var(--text3);transition:all .15s;border:1px solid transparent;line-height:1.3;}
.mtab:hover{color:var(--text2);}
.mtab.active{background:var(--surface3);border-color:var(--border2);color:var(--text);}
.mtab.layer2.active{color:var(--green);border-color:rgba(61,214,140,.25);background:rgba(61,214,140,.07);}
.mtab.layer3.active{color:var(--gold);border-color:rgba(245,200,66,.25);background:rgba(245,200,66,.07);}
.mtab.layer4.active{color:#a78bfa;border-color:rgba(167,139,250,.25);background:rgba(167,139,250,.07);}
.mtab.layer5.active{color:#22d3ee;border-color:rgba(34,211,238,.25);background:rgba(34,211,238,.07);}
.mtab-icon{font-size:14px;display:block;margin-bottom:3px;}

/* EXEC ENGINE TOOL GRID */
.tool-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px;}
.tool-card{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:13px 14px;cursor:pointer;transition:all .15s;}
.tool-card:hover{border-color:var(--green);background:rgba(61,214,140,.05);}
.tool-card.active{border-color:var(--green);background:rgba(61,214,140,.07);}
.tc-icon{font-size:18px;margin-bottom:5px;}
.tc-name{font-family:'Syne',sans-serif;font-size:12.5px;font-weight:700;color:var(--text);margin-bottom:2px;}
.tc-desc{font-size:11px;color:var(--text3);line-height:1.4;}

/* PROBLEM SOLVER */
.ps-chat{display:flex;flex-direction:column;gap:14px;padding-bottom:16px;}
.ps-msg{padding:14px 17px;border-radius:11px;font-size:13.5px;line-height:1.75;}
.ps-msg.user{background:var(--glow);border:1px solid rgba(255,107,43,.2);color:var(--text);align-self:flex-end;max-width:85%;}
.ps-msg.ai{background:var(--surface2);border:1px solid var(--border);color:var(--text);}
.ps-msg.ai .rlabel{margin-bottom:10px;}
.ps-input-wrap{display:flex;gap:10px;align-items:flex-end;}
.ps-input-wrap textarea{flex:1;min-height:60px;max-height:140px;}

/* LAYER SECTION HEADERS IN SIDEBAR */
.s-section{padding:10px 18px 4px;font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;}

/* EXEC OUTPUT CHIPS */

// ── API LAYER ──────────────────────────────────────────────────────────────────
// Shared AI call — used by all 3 layers
const OPENROUTER_API_BASE = 'https://openrouter.ai/api/v1';
const OPENROUTER_SITE_URL = window.location.origin && window.location.origin !== 'null'
  ? window.location.origin
  : 'https://brandos.app';
const OPENROUTER_APP_TITLE = 'BrandOS';

function getApiKey() {
  const activeInput = document.getElementById('keyInp');
  const key = (activeInput?.value || S.key || '').trim();
  if (key && key !== S.key) S.key = key;
  return key;
}

function requireApiKey() {
  const key = getApiKey();
  if (!key) throw new Error('Enter your OpenRouter API key first.');
  if (!key.startsWith('sk-or-')) throw new Error('OpenRouter keys usually start with sk-or-. Check that you pasted the right key.');
  return key;
}

async function openRouterFetch(path, options = {}) {
  const headers = {
    'Authorization': `Bearer ${requireApiKey()}`,
    'HTTP-Referer': OPENROUTER_SITE_URL,
    'X-Title': OPENROUTER_APP_TITLE,
    ...(options.headers || {})
  };
  return fetch(`${OPENROUTER_API_BASE}${path}`, { ...options, headers });
}

async function readOpenRouterError(res) {
  const fallback = `OpenRouter request failed with HTTP ${res.status}`;
  try {
    const data = await res.json();
    return data.error?.message || data.message || fallback;
  } catch(e) {
    return fallback;
  }
}

async function callAI(userMsg, systemPrompt, extraHistory) {
  requireApiKey();
  const contents = extraHistory ? [...extraHistory] : [];
  contents.push({ role:'user', content: userMsg });

  async function tryModel(model) {
    const res = await openRouterFetch('/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model,
        messages: [
          { role:'system', content: systemPrompt || SYSPROMPT },
          ...contents
        ],
        max_tokens: 4096,
        temperature: 0.85
      })
    });
    if (!res.ok) {
      throw new Error(await readOpenRouterError(res));
    }
    const data = await res.json();
    const text = data.choices?.[0]?.message?.content;
    if (!text) throw new Error('Empty response');
    // Track which model succeeded
    const modelName = model.split('/').pop().replace(':free','');
    document.getElementById('modelLabel').textContent = modelName;
    return text;
  }

  let discoveredFreeModels = [];
  // Auto-discover free models
  try {
    const modelsRes = await openRouterFetch('/models', {
      headers: { 'Content-Type':'application/json' }
    });
    if (modelsRes.ok) {
      const modelsData = await modelsRes.json();
      discoveredFreeModels = modelsData.data
        .filter(m => m.id.includes(':free'))
        .map(m => m.id);
    }
  } catch(e) { /* fall through */ }

  const FALLBACK = [
    'openai/gpt-oss-20b:free',
    'openai/gpt-oss-120b:free',
    'qwen/qwen3-next-80b-a3b-instruct:free',
    'qwen/qwen3-coder:free',
    'z-ai/glm-4.5-air:free',
    'minimax/minimax-m2.5:free',
    'nvidia/nemotron-nano-9b-v2:free',
    'google/gemma-4-31b-it:free',
    'google/gemma-4-26b-a4b-it:free',
    'google/gemma-3-12b-it:free',
    'google/gemma-3-4b-it:free',
    'meta-llama/llama-3.3-70b-instruct:free',
    'meta-llama/llama-3.2-3b-instruct:free',
    'google/gemma-3-27b-it:free',
    'google/gemma-3n-e4b-it:free',
    'google/gemma-3n-e2b-it:free',
  ];
  let lastErr = '';
  const candidateModels = [...new Set([...discoveredFreeModels, ...FALLBACK])];
  for (const model of candidateModels) {
    try { return await tryModel(model); }
    catch(e) { lastErr = e.message; continue; }
  }
  throw new Error('All models failed. Last error: ' + lastErr);
}

// Strategy layer wrapper — injects previous step context
async function gemini(userMsg) {
  const history = [];
  for (let i = 1; i <= 13; i++) {

      history.push({ role:'user',      content: S.resp[i].inp });
      history.push({ role:'assistant', content: S.resp[i].out });
    }
  }
  return callAI(userMsg, SYSPROMPT, history);
}

// ── SYSTEM PROMPT ──────────────────────────────────────────────────────────────
const SYSPROMPT = `You are BrandOS — a world-class strategy intelligence system with the combined reasoning capability of a McKinsey EM, a Bain commercial diligence partner, and a BCG growth strategist, filtered through deep knowledge of India as a market. You have advised businesses across every sector — consumer goods, SaaS, fintech, healthtech, edtech, B2B services, manufacturing, retail, logistics, media, real estate, and more. You operate at the level of a Rs. 2 crore engagement, delivered instantly.

You do not give marketing advice. You give strategy. The difference: marketing advice tells you what to do. Strategy tells you why it will work, what the risks are, what assumptions it rests on, and what would have to be true for it to succeed.

═══════════════════════════════════════════
CONSULTING INTELLIGENCE — HOW YOU THINK
═══════════════════════════════════════════

FIRST PRINCIPLES BEFORE FRAMEWORKS:
Frameworks are tools, not answers. Before applying any framework, you do what every great consultant does first — you understand the specific business deeply enough to have a hypothesis. Then you use frameworks to stress-test the hypothesis, not to generate it. You never fill a framework mechanically. You fill it with insight.

THE MECE PRINCIPLE:
Every analysis you produce is Mutually Exclusive and Collectively Exhaustive. You do not repeat points. You do not leave critical dimensions uncovered. Every list, every matrix, every recommendation set is structured so that the pieces do not overlap and together they cover the complete picture.

HYPOTHESIS-DRIVEN THINKING:
Like McKinsey, you form a hypothesis early and work to prove or disprove it. You state your hypothesis clearly. You identify the 3-5 key questions whose answers determine whether the hypothesis holds. You give your current view on each. This is faster and sharper than open-ended exploration.

ISSUE TREE DECOMPOSITION:
For every complex problem, you decompose it into a logical tree. Revenue problem? Break into volume and price. Volume problem? Break into acquisition and retention. Acquisition problem? Break into awareness, consideration, and conversion. You go 3 levels deep before recommending solutions.

SO WHAT TEST:
Every insight you generate must pass the So What test. A fact without implication is not an insight. "The Indian premium food market is growing at 18% CAGR" is a fact. "This means a challenger brand has a 24-36 month window before incumbents respond with premium sub-brands, making speed of distribution the single most important variable right now" is an insight. You always state the implication, not just the observation.

THE PYRAMID PRINCIPLE:
Structure every response with the conclusion first, then the supporting arguments, then the evidence. Indian founders are busy. They need the answer in the first paragraph, not at the end. Lead with the recommendation. Then justify it.

═══════════════════════════════════════════
STRATEGIC LENSES — APPLIED TO EVERY BUSINESS
═══════════════════════════════════════════

MARKET LENS — Is this a good market to be in?
Analyze market size, growth rate, fragmentation, and the distribution of value across the value chain. Identify where the profit pools are. Determine whether the market structure favors incumbents or challengers. Assess whether the market is growing because of genuine demand creation or just category switching.

COMPETITIVE LENS — Can this business win?
Identify the basis of competition in this market. Is it price? Quality? Distribution? Network effects? Switching costs? Brand? Assess the business's current and potential competitive advantage against each dimension. Identify the one thing that, if true, would make this business unbeatable. Identify the one thing that, if it fails, makes the business irrelevant.

CUSTOMER LENS — Will the target customer actually buy?
Go beyond demographics. Understand the decision-making process: who triggers the purchase, who influences it, who has veto power, who pays, and who uses it. Understand what job the customer is actually hiring this product to do — and whether the product does that job better than the current alternative. In India specifically, understand how trust is established in this category, because Indian consumers require trust before money changes hands.

BUSINESS MODEL LENS — Will the economics work?
Assess unit economics: what does it cost to acquire a customer, what is the gross margin per unit, what is the lifetime value, what is the payback period. Identify the operating leverage inflection point — the scale at which the business model becomes self-sustaining. Identify the working capital dynamics, which in India are often the constraint that kills otherwise good businesses.

EXECUTION LENS — Can this team, in this market, actually do it?
Strategy without execution is fantasy. Assess what the hardest thing to execute is — usually distribution, talent, or capital. Identify the critical path: what has to happen in what sequence for this strategy to work. Identify the biggest assumption that, if wrong, collapses the plan.

═══════════════════════════════════════════
INDIA AS A STRATEGIC VARIABLE
═══════════════════════════════════════════

India is not a single market and not simply a "developing market version" of Western markets. India has specific structural characteristics that change strategy fundamentally:

STRUCTURAL CHARACTERISTICS TO ALWAYS CONSIDER:
- Price-value architecture: India has the world's most sophisticated price-sensitive consumers. They are not poor — they are value-maximizing. The question is never "will they pay?" but "what proof of value justifies this price to this specific segment?"
- Trust infrastructure deficit: In the absence of strong institutions, Indian consumers and businesses rely on personal relationships, known brands, and social proof. New entrants must architect trust deliberately — it does not come from product quality alone.
- Distribution complexity: India's physical geography and fragmented retail mean distribution is always a strategic variable, not an operational one. How you reach your customer in India requires as much strategic thinking as what you sell them.
- Regulatory heterogeneity: India has 28 states with different tax structures, licensing requirements, and regulatory environments. Strategy must account for this — what works in Maharashtra may be illegal or uneconomical in another state.
- Digital-physical integration: India leapfrogged many digital stages but did not abandon physical. The most effective go-to-market strategies in India integrate digital discovery with physical availability, or digital commerce with physical trust signals.
- Talent and execution constraints: India has abundant talent but acute execution capacity constraints at the mid-management level. Strategy must be designed for the available execution capacity, not the theoretical ideal.

INDIA-SPECIFIC INSIGHT GENERATION:
For every business analyzed, you generate at least one insight that is true for India that would NOT be true in the US, Europe, or China. This is the India-specific strategic advantage or risk that only someone with deep India knowledge would identify.

═══════════════════════════════════════════
OUTPUT STANDARDS — WORLD CLASS MEANS THIS
═══════════════════════════════════════════

WHAT WORLD CLASS LOOKS LIKE:
A McKinsey slide has one key message per page, supported by 3 pieces of evidence, with a clear "so what" for the client. Your responses follow this logic — each section has one key message, supported by specific evidence, with a clear implication for THIS founder's specific decision.

SPECIFICITY IS NON-NEGOTIABLE:
Vague answers are not acceptable. "Consider digital marketing" is not an answer. "Your highest-ROI acquisition channel in the first 6 months is X because your target customer does Y and the average CAC on this channel for this category is Z" is an answer. Always be specific. Always give a number. Always name the thing.

INTELLECTUAL HONESTY:
If the data does not support a conclusion, say so. If the founder's plan has a fundamental flaw, name it directly. If a strategy has a 30% chance of working and a 70% chance of failing, say that — and explain both scenarios. World-class consultants do not tell clients what they want to hear. They tell clients what they need to know.

BRUTAL TRUTHS — MANDATORY IN EVERY RESPONSE:
End every response with 2-3 Brutal Truths — things the founder probably does not want to hear but absolutely must know. The best consulting relationships are built on this honesty. Founders pay for truth, not validation.

FORMAT:
## for major sections. **Bold** for key insights and conclusions. Tables for comparisons and matrices. Bullet points for supporting evidence. Always lead with the most important point.
`;

function switchMode(mode) {
  if (!getApiKey()) { toast('Enter your OpenRouter API key first', 'err'); return; }
  S.mode = mode;
  renderSidebar();
  if (mode === 'strategy') {
    if (S.step) goStep(S.step); else showWelcomeContent();
  } else if (mode === 'execution') {
    showExecEngine();
  } else if (mode === 'finance') {
    showFinanceEngine();
  } else if (mode === 'research') {
    showResearchEngine();
  } else {
    showSolver();
  }
}

function nav(d) {
  const n = S.step + d;
  if (n >= 1 && n <= 13) goStep(n);
  else if (n === 0) showWelcome();
}

function clearExec(id) { delete S.resp[`exec_${id}`]; selectExecTool(id); }

function runExecTool(id) {
  const tool = EXEC_TOOLS.find(t=>t.id===id);
  const b = S.brand;
  const vals = {};
  for (let i = 1; i <= 5; i++) {
    const el = document.getElementById(`et${i}`);
    if (el) vals[`et${i}`] = el.value.trim();
  }

  const brandCtx = b.brand ? `\n\nBRAND CONTEXT (from Step 1):\nBrand: ${b.brand}\nProduct: ${b.product}\nBusiness Model: ${b.bizModel||'Not set'}\nTarget Customer: ${b.target}\nUSP: ${b.usp}\nChannels: ${b.channels}\nLocation: ${b.location}` : '\n\nNo brand profile set — generate based on the inputs below.';

  const prompts = {
    meta_ad: `EXECUTION ENGINE — META AD COPY GENERATOR\n\nGenerate 5 distinct Meta/Instagram ad variants. Each must be immediately usable — not a template, real copy.\n\nFor each ad:\n**Variant [N] — [Hook Type]**\n- **Primary Text** (the main copy, 100-150 chars max)\n- **Headline** (under 40 chars, punchy)\n- **Description** (under 30 chars)\n- **CTA Button**: [Buy Now / Learn More / Shop Now / etc]\n- **Visual direction**: 1 line describing what the image/video should show\n- **Why this works**: the psychological lever it pulls${brandCtx}\n\nCampaign objective: ${vals.et1}\nProduct/offer: ${vals.et2}\nTarget audience: ${vals.et3}\nTone: ${vals.et4}\nConstraints: ${vals.et5||'None'}\n\nMake ads feel native to Indian Instagram — culturally specific, real language, not translated Western copy. Include at least 1 variant with a Hindi phrase or culturally Indian hook.`,

    whatsapp_drip: `EXECUTION ENGINE — WHATSAPP DRIP SEQUENCE\n\nGenerate a 4-week WhatsApp message sequence. Each message must feel like it's from a real person, not a brand bot. Short, punchy, conversational.\n\nFor each message:\n**Week [N] — Day [X]: [Message Purpose]**\nMessage: [The actual WhatsApp text — include emojis, natural language, max 200 words]\nSend time: [Best time to send]\nIf replied: [What to say if they reply positively]\n\nTotal: 8 messages (2 per week — spaced 3-4 days apart)${brandCtx}\n\nGoal: ${vals.et1}\nProduct: ${vals.et2}\nFinal CTA: ${vals.et3}\nTone: ${vals.et4}\nContext: ${vals.et5||'None'}\n\nCritical: These must feel like messages from a friend who happens to sell this product. Not broadcast copy. WhatsApp is personal — treat it that way. Include 1 message that asks a question to create a reply.`,

    influencer_brief: `EXECUTION ENGINE — INFLUENCER BRIEF\n\nGenerate a complete, ready-to-send influencer brief. Format it so the creator can read it in 3 minutes and know exactly what to do.\n\n## Campaign Brief for [Influencer Name]\n\n### What We're Doing\n[1 paragraph — why this campaign, what we're asking, why it's exciting for their audience]\n\n### The Brand\n[2-3 sentences — what we are, why it matters to Indians, our positioning]\n\n### What We Need\n[Exact deliverables with specs]\n\n### Key Messages to Land\n[3-5 bullet points — what they MUST communicate]\n\n### How To Say It\n[2-3 bullet points on tone, style, what feels authentic]\n\n### What NOT To Do\n[Hard limits — legal, brand, competitive sensitivities]\n\n### Content Guidelines\n[Disclosure requirements, hashtags, tagging, approval process]\n\n### Timeline\n[Draft due → Approval → Live date]\n\n### Contact\n[Template line for who to reach]\n${brandCtx}\n\nPlatform/type: ${vals.et1}\nCampaign: ${vals.et2}\nDeliverables: ${vals.et3}\nKey messages: ${vals.et4}\nDon'ts: ${vals.et5||'None'}`,

    email_sequence: `EXECUTION ENGINE — EMAIL SEQUENCE\n\nGenerate a ${vals.et4}-email sequence. Each email must be complete and ready to send — real subject lines, real body copy, not placeholders.\n\nFor each email:\n**Email [N] of ${vals.et4} — [Send timing: e.g., Day 0, Day 3, Day 7]**\nSubject line: [Primary subject]\nPreview text: [What shows in inbox below subject]\nBody:\n[Full email body — can be short (150 words) to medium (300 words). Real copy. Include PS where appropriate.]\nCTA: [Button text + what it links to]\n\n${brandCtx}\n\nSequence type: ${vals.et1}\nProduct: ${vals.et2}\nFinal CTA: ${vals.et3}\nContext: ${vals.et5||'None'}\n\nMake these feel human. Indian email recipients get 200 promotional emails a day — these must stand out by being specific, useful, and honest. No "Hope this email finds you well."`,

    content_calendar: `EXECUTION ENGINE — 30-DAY CONTENT CALENDAR\n\nGenerate a complete content calendar. For each post, give real copy — not just topics.\n\nFormat for each post:\n**[Date/Day] — [Post Type: Reel/Carousel/Static/Story]**\nCaption (ready to post):\nHook line: [First 1-2 lines visible before "more"]\nBody: [Full caption]\nCTA: [Last line call to action]\nHashtags: [10-15 relevant]\nVisual direction: [1 line on what to shoot/design]\n\nGenerate ${vals.et3==='daily'?'30':vals.et3==='5x'?'20':'12'} posts spread across the month.${brandCtx}\n\nPlatform: ${vals.et1}\nTheme/campaign: ${vals.et2}\nContent pillars: ${vals.et4||'Mix of education, storytelling, product, social proof'}\nKey dates: ${vals.et5||'None specified'}`,

    sales_script: `EXECUTION ENGINE — SALES SCRIPT\n\nGenerate a complete sales script for ${vals.et1}. This should be a real script a founder or SDR can pick up and use today.\n\n## The Script\n\n**OPENER (first 15 seconds)**\n[Exact words — natural, not robotic]\n\n**QUALIFICATION (30 seconds)**\n[2-3 qualifying questions to confirm they're the right person]\n\n**THE PITCH (60 seconds)**\n[The core value proposition — specific, outcome-oriented, India-relevant]\n\n**OBJECTION HANDLERS**\nFor each of the 3 objections given:\n> Objection: "[Their words]"\n> Response: "[Exact reframe or answer]"\n\n**THE ASK (closing)**\n[Exact words to get to the desired outcome]\n\n**IF THEY SAY NO**\n[The graceful exit that leaves the door open]\n\n**FOLLOW-UP MESSAGE**\n[The WhatsApp/email to send within 2 hours]\n${brandCtx}\n\nChannel: ${vals.et1}\nProduct: ${vals.et2}\nTarget buyer: ${vals.et3}\nObjections: ${vals.et4}\nDesired outcome: ${vals.et5}`,

    launch_press: `EXECUTION ENGINE — LAUNCH PRESS NOTE + PITCH EMAIL\n\nGenerate two things:\n\n## 1. Press Release (400-500 words)\n[Standard press release format — headline, dateline, lede, quote, body, boilerplate, ###]\n\n## 2. Media Pitch Email (under 150 words)\n[Subject line + short pitch email to the editor — what's the story hook, why their readers care, what you're offering (interview, exclusive, demo)]\n${brandCtx}\n\nLaunch: ${vals.et1}\nHeadline news: ${vals.et2}\nTarget outlets: ${vals.et3}\nKey facts: ${vals.et4}\nFounder quote: ${vals.et5||'Generate an appropriate quote based on the brand context'}`,

    campaign_brief: `EXECUTION ENGINE — CAMPAIGN BRIEF\n\nGenerate a complete campaign brief that a marketing team can execute from immediately.\n\n## Campaign Brief: [Campaign Name]\n\n### 1. Campaign Objective\n[One clear sentence. What does success look like in numbers?]\n\n### 2. Target Audience\n[Primary + secondary. Psychographic description, not just demographics.]\n\n### 3. Core Campaign Message\n[The single idea the campaign must communicate. One sentence.]\n\n### 4. Creative Concept\n[The campaign idea — the theme, the story, the hook. 2-3 paragraphs.]\n\n### 5. Channel Plan\n| Channel | Role | Budget | KPI |\n|---|---|---|---|\n[Fill for each channel]\n\n### 6. Content Requirements\n[What needs to be produced — formats, quantities, specs]\n\n### 7. Timeline & Milestones\n[Week-by-week from brief to live]\n\n### 8. Budget Breakdown\n[Exact rupee split]\n\n### 9. Success Metrics\n[KPIs at 30/60 days]\n\n### 10. Approvals Required\n[What needs sign-off and from whom]\n${brandCtx}\n\nObjective: ${vals.et1}\nTheme: ${vals.et2}\nBudget: ${vals.et3}\nDuration: ${vals.et4}\nConstraints: ${vals.et5||'None'}`,
  };

  const p = prompts[id];
  if (!p) { toast('Tool not ready', 'err'); return; }
  executeExec(id, p, tool);
}

async function executeExec(id, prompt, tool) {
  if (!getApiKey()) { toast('Enter your OpenRouter API key first', 'err'); return; }
  const btn = document.getElementById('runBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Generating...'; }
  const c = document.getElementById('content');
  let loader = document.createElement('div');
  loader.id = 'loader';
  loader.className = 'loading';
  loader.innerHTML = `<div class="spin"></div><div><div class="ltxt">Generating ${tool.name}...</div><div class="lsub">Calibrating to your brand + India context</div></div>`;
  c.appendChild(loader);
  c.scrollTop = c.scrollHeight;
  try {
    const out = await callAI(prompt);
    S.resp[`exec_${id}`] = { inp: prompt, out };
    saveState();
    loader.remove();
    selectExecTool(id);
    setTimeout(() => {
      const rb = document.querySelector('.rbox');
      if (rb) rb.scrollIntoView({behavior:'smooth', block:'start'});
    }, 100);
    toast(`${tool.name} ready!`, 'ok');
  } catch(err) {
    loader.remove();
    if (btn) { btn.disabled = false; btn.textContent = 'Try Again →'; }
    toast('Error: ' + err.message, 'err');
  }
}

function renderSolverChat() {
  const c = document.getElementById('content');
  const b = S.brand;
  const brandCtx = b.brand ? `<div style="background:rgba(255,107,43,.07);border:1px solid rgba(255,107,43,.15);border-radius:9px;padding:12px 16px;margin-bottom:18px;font-size:12.5px;color:var(--text2);">🔗 Using brand context: <b style="color:var(--accent)">${b.brand}</b> · ${b.bizModel||'Business'} · ${b.location||'India'}</div>` : `<div style="background:rgba(245,200,66,.07);border:1px solid rgba(245,200,66,.2);border-radius:9px;padding:12px 16px;margin-bottom:18px;font-size:12.5px;color:var(--gold);">⚠️ No brand profile loaded. Describe your business in your message for better answers. Or complete Step 1 in Strategy mode.</div>`;

  const chatHtml = S.solverHistory.length > 0 ?
    `<div class="ps-chat">` +
    S.solverHistory.map(m => `
      <div class="ps-msg ${m.role==='user'?'user':'ai'}">

          ${m.role==='assistant' ? md(m.content) : escHtml(m.content)}
        </div>
      </div>`).join('') +
    (S.solverRunning ? `<div class="loading" style="align-self:flex-start;"><div class="spin"></div><div><div class="ltxt">Diagnosing...</div><div class="lsub">Forming diagnosis + action plan</div></div></div>` : '') +
    `</div>` :
    `<div style="text-align:center;padding:32px 20px 20px;">

      <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:8px;">What's the problem?</div>
      <div style="color:var(--text2);font-size:13.5px;max-width:400px;margin:0 auto 20px;line-height:1.7;">Describe a real business problem you're facing right now. BrandOS will diagnose it and give you 3 specific actions to execute this week.</div>
      <div style="display:flex;flex-direction:column;gap:8px;max-width:400px;margin:0 auto;">
        ${[
          'Our CAC on Meta doubled in the last 30 days — what do we do?',
          'Our distributor is pushing our product to the back shelf. How do I fix this?',
          'We\'re getting trials but nobody converts to paid. Why?',
          'Our biggest competitor just slashed prices by 30%. Should we match?',
        ].map(eg => `<div onclick="fillSolverPrompt('${eg.replace(/'/g,"\\'")}') " style="background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;font-size:12.5px;color:var(--text2);cursor:pointer;text-align:left;transition:all .15s;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border2)'">${eg}</div>`).join('')}
      </div>
    </div>`;

  c.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:14px;height:100%;">
      ${brandCtx}
      <div style="flex:1;overflow-y:auto;" id="solverScrollArea">
        ${chatHtml}
      </div>
      <div class="card" style="flex-shrink:0;">
        <div class="card-body" style="padding:16px;">
          <div class="ps-input-wrap">
            <textarea id="solverInput" placeholder="Describe your problem: what's happening, since when, what you've tried…" rows="3" onkeydown="if(event.key==='Enter'&&(event.ctrlKey||event.metaKey)){event.preventDefault();sendSolverMessage();}"></textarea>
            <button class="btn btn-p" onclick="sendSolverMessage()" style="flex-shrink:0;align-self:flex-end;" id="solverBtn">Diagnose →</button>
          </div>
          <div style="font-size:11px;color:var(--text3);margin-top:8px;">Ctrl+Enter to send · The more context you give, the sharper the diagnosis</div>
          ${S.solverHistory.length > 0 ? `<button class="btn btn-g" style="margin-top:10px;font-size:12px;padding:7px 14px;" onclick="clearSolver()">Clear conversation ↺</button>` : ''}
        </div>
      </div>
    </div>`;
}

function fillSolverPrompt(text) {
  const el = document.getElementById('solverInput');
  if (el) { el.value = text; el.focus(); }
}

function clearSolver() { S.solverHistory = []; renderSolverChat(); }

async function sendSolverMessage() {
  const inp = document.getElementById('solverInput');
  if (!inp) return;
  const msg = inp.value.trim();
  if (!msg) { toast('Describe your problem first', 'err'); return; }
  if (!getApiKey()) { toast('Enter your OpenRouter API key first', 'err'); return; }
  inp.value = '';
  S.solverHistory.push({ role: 'user', content: msg });
  S.solverRunning = true;
  renderSolverChat();
  // scroll to bottom
  setTimeout(() => {
    const sa = document.getElementById('solverScrollArea');
    if (sa) sa.scrollTop = sa.scrollHeight;
  }, 50);

  const b = S.brand;
  const brandCtxStr = b.brand ? `\n\nBRAND CONTEXT:\nBrand: ${b.brand}\nProduct: ${b.product}\nBusiness Model: ${b.bizModel||'Not set'}\nTarget: ${b.target}\nUSP: ${b.usp}\nChannels: ${b.channels}\nStage: ${b.stage}\nLocation: ${b.location}\nBudget: ${b.budget}` : '';

  // Build conversation for API
  const messages = [];
  for (let i = 0; i < S.solverHistory.length - 1; i++) {
    messages.push(S.solverHistory[i]);
  }
  // Final user message with brand context
  const fullMsg = `${msg}${brandCtxStr}`;

  const solverSystemPrompt = `You are BrandOS Problem Solver — a world-class Indian business consultant in emergency mode. A founder is describing a real problem they're facing RIGHT NOW.

Your job is NOT to give a 13-step analysis. Your job is to:
1. DIAGNOSE the root cause (the real problem, not the symptom they described)
2. Give 3 SPECIFIC actions they can execute THIS WEEK — not "consider doing X", but "do X on Tuesday by calling Y and saying Z"
3. Flag the ONE thing that, if they don't fix this week, makes everything else irrelevant

FORMAT every response as:

## The Real Problem
[1-2 sentences: the root cause diagnosis. Be blunt. Indian founders respect directness.]

## Why This Is Happening
[2-3 bullet points: the structural reasons, with India-specific context where relevant]

## 3 Actions to Run This Week

**Action 1: [Name]** — [Specific, executable instruction. Who does what, to whom, by when. Include specific language if relevant.]

**Action 2: [Name]** — [Same format]

**Action 3: [Name]** — [Same format]

## The One Thing That Can't Wait
[1 sentence. The action with the highest leverage / biggest downside if ignored.]

## Brutal Truth
[1-2 sentences the founder probably doesn't want to hear but must know.]

Be direct. Be specific. Give numbers. Name the thing. Never say "it depends" without immediately saying what it depends on and which direction to lean.`;

  try {
    const out = await callAI(fullMsg, solverSystemPrompt, messages);
    S.solverHistory.push({ role: 'assistant', content: out });
  } catch(err) {
    S.solverHistory.push({ role: 'assistant', content: `⚠️ Error: ${err.message}` });
  }
  S.solverRunning = false;
  saveState();
  renderSolverChat();
  setTimeout(() => {
    const sa = document.getElementById('solverScrollArea');
    if (sa) sa.scrollTop = sa.scrollHeight;
  }, 100);
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function escAttr(t) {
  return escHtml(String(t || '')).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function connectKey() {
  const inp = document.getElementById('keyInp');
  if (!inp) return;
  const k = inp.value.trim();
  if (!k || k.length < 20) { toast('Paste your OpenRouter key first', 'err'); return; }
  if (!k.startsWith('sk-or-')) { toast('That does not look like an OpenRouter key', 'err'); return; }
  S.key = k;
  inp.disabled = true;
  const btn = document.querySelector('.api-box .btn-p');
  if (btn) { btn.textContent = '✓ Connected — opening Step 1...'; btn.disabled = true; }
  setTimeout(() => goStep(1), 500);
}

// ── STEP RENDER ────────────────────────────────────────────────────────────────
function goStep(n) {
  if (!getApiKey()) { showWelcome(); setTimeout(() => toast('Enter your OpenRouter key first'), 200); return; }
  S.step = n;
  renderSidebar();
  const c = document.getElementById('content');

  let ctxHtml = '';
  if (S.brand.brand && n > 1) {
    const b = S.brand;
    const priceDetail = b.fmcgPrice||b.d2cPrice||b.saasPrice||b.b2cPrice||'';
    const compDetail  = b.fmcgComp||b.d2cComp||b.saasComp||b.b2cComp||'';
    ctxHtml = `<div class="ctx">
      <h4>Brand Context</h4>
      <div class="ctx-row"><span class="ctx-k">Brand</span><span class="ctx-v">${b.brand}</span></div>
      <div class="ctx-row"><span class="ctx-k">Product</span><span class="ctx-v">${b.product||'—'}</span></div>
      <div class="ctx-row"><span class="ctx-k">Model</span><span class="ctx-v">${b.bizModel||'—'}</span></div>
      <div class="ctx-row"><span class="ctx-k">Stage</span><span class="ctx-v">${S.stage||'—'}</span></div>
      <div class="ctx-row"><span class="ctx-k">Location</span><span class="ctx-v">${b.location||'—'}</span></div>
      ${priceDetail ? `<div class="ctx-row"><span class="ctx-k">Pricing</span><span class="ctx-v" style="color:var(--green);">${priceDetail}</span></div>` : ''}
      ${compDetail  ? `<div class="ctx-row"><span class="ctx-k">Competitors</span><span class="ctx-v" style="color:var(--accent2);">${compDetail}</span></div>` : ''}
      ${b.challenge ? `<div class="ctx-row"><span class="ctx-k">Challenge</span><span class="ctx-v" style="color:var(--gold);">${b.challenge}</span></div>` : ''}
    </div>`;
  }

  const prevResp = S.resp[n] ? `
    <div class="rbox">
      <div class="rhead">
        <div class="rlabel">BrandOS Analysis — Step ${n}</div>
        <button class="btn btn-g" style="font-size:11.5px;padding:5px 12px;" onclick="clearAndRerun(${n})">Re-run ↺</button>
      </div>
      <div class="rcontent">${md(S.resp[n].out)}</div>
    </div>` : '';

  const step = STEPS[n-1];
  c.innerHTML = `
    ${ctxHtml}
    <div class="card">
      <div class="card-head">
        <div class="card-badge">Step ${n} · ${['📋','👤','📊','🌍','🔍','🧠','🎯','💰','🚀','📈','⚠️','💬','📄'][n-1]}</div>
        <div>
          <div class="card-title">${step.label}</div>
          <div class="card-desc">${stepDesc(n)}</div>
        </div>
      </div>
      <div class="card-body">
        ${stepForm(n)}
        ${prevResp}
      </div>
    </div>`;

  c.scrollTop = 0;
}

function clearAndRerun(n) { delete S.resp[n]; S.done.delete(n); saveState(); goStep(n); }

// ── BUSINESS MODEL FIELD TOGGLE ────────────────────────────────────────────────
function toggleModelFields() {
  const biz = document.getElementById('f0biz')?.value || '';
  ['fmcg','d2c','saas','b2c'].forEach(m => {
    const el = document.getElementById('fields_' + m);
    if (el) el.style.display = 'none';
  });
  const map = { FMCG:'fmcg', D2C:'d2c', 'B2B SaaS':'saas', 'B2C Service':'b2c' };
  const key = map[biz];
  if (key) {
    const el = document.getElementById('fields_' + key);
    if (el) { el.style.display = 'block'; el.scrollIntoView({behavior:'smooth', block:'nearest'}); }
  }
}

// Call on step 1 load to restore selected model's fields
setTimeout(() => { if (document.getElementById('f0biz')) toggleModelFields(); }, 50);

// ── RUNNERS ────────────────────────────────────────────────────────────────────
function runStep1() {
  const brand = v('f1'), stage = v('f2'), bizModel = v('f0biz');
  if (!brand) { toast('Enter brand name', 'err'); return; }
  if (!stage) { toast('Select a stage', 'err'); return; }
  if (!bizModel) { toast('Select a business model', 'err'); return; }

  // Collect model-specific fields
  const modelData = {};
  if (bizModel === 'FMCG') {
    modelData.fmcgPrice = v('fmcg_price');
    modelData.fmcgCogs  = v('fmcg_cogs');
    modelData.fmcgDist  = v('fmcg_dist');
    modelData.fmcgComp  = v('fmcg_comp');
    modelData.fmcgDiff  = v('fmcg_diff');
  } else if (bizModel === 'D2C') {
    modelData.d2cPrice  = v('d2c_price');
    modelData.d2cCogs   = v('d2c_cogs');
    modelData.d2cOrders = v('d2c_orders');
    modelData.d2cCac    = v('d2c_cac');
    modelData.d2cComp   = v('d2c_comp');
  } else if (bizModel === 'B2B SaaS') {
    modelData.saasPrice = v('saas_price');
    modelData.saasArr   = v('saas_arr');
    modelData.saasIcp   = v('saas_icp');
    modelData.saasCycle = v('saas_cycle');
    modelData.saasComp  = v('saas_comp');
  } else if (bizModel === 'B2C Service') {
    modelData.b2cPrice  = v('b2c_price');
    modelData.b2cUsers  = v('b2c_users');
    modelData.b2cComp   = v('b2c_comp');
  }

  S.brand = {
    brand, stage, bizModel,
    product: v('f3'), location: v('f4'), revenue: v('f5'),
    target: v('f6'), channels: v('f7'), usp: v('f8'),
    budget: v('f9'), challenge: v('f_challenge'), notes: v('f10'),
    ...modelData,
    isB2B:  bizModel === 'B2B SaaS' || bizModel === 'Marketplace',
    isD2C:  bizModel === 'D2C',
    isFMCG: bizModel === 'FMCG',
    isSaaS: bizModel === 'B2B SaaS',
  };
  S.stage = stage;
  saveState();
  renderSidebar();

  // ── SUFFICIENCY GATE ─────────────────────────────────────────────────────────
  // Build a summary of what we have and what's missing
  const pricingFilled = !!(
    modelData.fmcgPrice || modelData.d2cPrice || modelData.saasPrice || modelData.b2cPrice
  );
  const competitorsFilled = !!(
    modelData.fmcgComp || modelData.d2cComp || modelData.saasComp || modelData.b2cComp
  );
  const productDetail = (v('f3') || '').length > 20;
  const targetDetail  = (v('f6') || '').length > 15;

  // Critical gaps — always block
  const hardGaps = [];
  if (!pricingFilled) hardGaps.push('pricing / price points');
  if (!productDetail) hardGaps.push('product description (needs more detail)');

  // Soft gaps — ask but don't block
  const softGaps = [];
  if (!competitorsFilled) softGaps.push('key competitors with their prices');
  if (!targetDetail)      softGaps.push('target customer specifics (age, city tier, occasion)');
  if (!v('f4'))           softGaps.push('primary launch geography');
  if (!v('f_challenge'))  softGaps.push('biggest challenge right now');

  if (hardGaps.length > 0) {
    // Show inline error prompts — don't proceed
    showGapWarning(hardGaps, softGaps, false);
    return;
  }

  if (softGaps.length >= 2) {
    // Enough gaps that analysis quality will suffer — ask for clarification
    showClarificationPanel(softGaps);
    return;
  }

  // All good — run analysis
  execute(1, prompt(1, {}));
}

// ── EXECUTE ────────────────────────────────────────────────────────────────────
async function execute(n, p) {
  if (!getApiKey()) {
    showWelcome();
    setTimeout(() => toast('Enter your OpenRouter key first', 'err'), 300);
    return;
  }
  // Always append real brand data so no step falls back to generic averages
  if (n !== 1) p = p + brandDetailFooter();

  const btn = document.getElementById('runBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Analyzing...'; }

  // Show loading spinner
  const c = document.getElementById('content');
  let loader = document.getElementById('loader');
  if (!loader) {
    loader = document.createElement('div');
    loader.id = 'loader';
    loader.className = 'loading';
    loader.innerHTML = `<div class="spin"></div><div><div class="ltxt">BrandOS is analyzing...</div><div class="lsub">Applying Indian market intelligence</div></div>`;
    c.appendChild(loader);
  }
  c.scrollTop = c.scrollHeight;

  try {
    const out = await gemini(p);
    S.resp[n] = { inp: p, out };
    S.done.add(n);
    saveState();
    loader.remove();
    renderSidebar();
    goStep(n);
    // Scroll to response
    setTimeout(() => {
      const rb = document.querySelector('.rbox');
      if (rb) rb.scrollIntoView({behavior:'smooth', block:'start'});
    }, 100);
    toast('Step ' + n + ' complete!', 'ok');
  } catch(err) {
    loader.remove();
    if (btn) { btn.disabled = false; btn.textContent = 'Try Again →'; }
    toast('Error: ' + err.message, 'err');
    // Show error in content too
    const errDiv = document.createElement('div');
    errDiv.style.cssText = 'background:rgba(255,77,106,.1);border:1px solid rgba(255,77,106,.3);border-radius:10px;padding:18px;margin-top:16px;font-size:13.5px;color:var(--red);';
    errDiv.innerHTML = '<strong>API Error:</strong> ' + escHtml(err.message) + '<br><br><span style="color:var(--text2);font-size:12px;">Check that your OpenRouter API key is valid and that your account can access the selected free models.</span>';
    c.appendChild(errDiv);
  }
}

// ── MARKDOWN RENDERER ─────────────────────────────────────────────────────────
function md(t) {
  // Escape HTML first
  t = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Headers
  t = t.replace(/^#### (.+)$/gm,'<h4>$1</h4>');
  t = t.replace(/^### (.+)$/gm,'<h4>$1</h4>');
  t = t.replace(/^## (.+)$/gm,'<h3>$1</h3>');
  t = t.replace(/^# (.+)$/gm,'<h2>$1</h2>');
  // Bold / italic
  t = t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g,'<em>$1</em>');
  // HR
  t = t.replace(/^---+$/gm,'<hr>');
  // Tables (basic)
  t = t.replace(/^\|(.+)\|$/gm, (line) => {
    if (line.replace(/[\s\-\|]/g,'') === '') return '<tr class="thead-sep"></tr>';
    const cells = line.split('|').filter((_,i,a)=>i>0&&i<a.length-1);
    return '<tr>' + cells.map(c=>`<td>${c.trim()}</td>`).join('') + '</tr>';
  });
  t = t.replace(/(<tr>.*<\/tr>\n?)+/gs, m => `<table>${m}</table>`);
  // Lists
  t = t.replace(/^- (.+)$/gm,'<li>$1</li>');
  t = t.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  t = t.replace(/(<li>[\s\S]*?<\/li>)(\n(?!<li>)|$)/g,'<ul>$1</ul>$2');
  // Paragraphs
  t = t.replace(/\n\n/g,'</p><p>');
  t = t.replace(/\n/g,'<br>');
  return '<p>' + t + '</p>';
}

// ── BRAND MEMORY (localStorage) ───────────────────────────────────────────────
const STORAGE_KEY = 'brandos_v1';

function saveState() {
  try {
    const toSave = {
      key:           S.key,
      step:          S.step,
      done:          [...S.done],
      brand:         S.brand,
      resp:          S.resp,
      stage:         S.stage,
      mode:          S.mode,
      execTool:      S.execTool,
      finTool:       S.finTool,
      resTool:       S.resTool,
      solverHistory: S.solverHistory,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
  } catch(e) { /* storage full or unavailable */ }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const saved = JSON.parse(raw);
    S.key           = saved.key           || '';
    S.step          = saved.step          || 0;
    S.done          = new Set(saved.done  || []);
    S.brand         = saved.brand         || {};
    S.resp          = saved.resp          || {};
    S.stage         = saved.stage         || '';
    S.mode          = saved.mode          || 'strategy';
    S.execTool      = saved.execTool      || null;
    S.finTool       = saved.finTool       || 'unit_econ';
    S.resTool       = saved.resTool       || 'demand';
    S.solverHistory = saved.solverHistory || [];
    return true;
  } catch(e) { return false; }
}

function clearMemory() {
  if (!confirm('Clear all saved brand data and step outputs? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  S.key = ''; S.step = 0; S.done = new Set(); S.brand = {};
  S.resp = {}; S.stage = ''; S.mode = 'strategy';
  S.execTool = null; S.finTool = 'unit_econ'; S.resTool = 'demand'; S.solverHistory = [];
  renderSidebar();
  showWelcome();
  toast('Memory cleared', 'ok');
}

function fmt(n, prefix='₹') {
  if (Math.abs(n) >= 10000000) return prefix + (n/10000000).toFixed(2) + ' Cr';
  if (Math.abs(n) >= 100000) return prefix + (n/100000).toFixed(2) + ' L';
  if (Math.abs(n) >= 1000) return prefix + (n/1000).toFixed(1) + 'K';
  return prefix + Math.round(n).toLocaleString('en-IN');
}

function fmtPct(n) { return n.toFixed(1) + '%'; }

function finInputRow(label, key, min, max, step, unit='₹', multiplier=1) {
  const val = FIN[key];
  const display = unit === '₹' ? fmt(val * multiplier) : fmtPct(val);
  return `<div class="fin-slider-row">
    <div class="fin-slider-label">${label}</div>
    <input type="range" min="${min}" max="${max}" step="${step}" value="${val}"
      oninput="FIN['${key}']=+this.value; document.getElementById('sv_${key}').textContent=this.value>999&&'${unit}'==='₹'?fmt(+this.value*${multiplier}):(this.value+'${unit==='₹'?'':unit}'); recalcFin();">
    <div class="fin-slider-val" id="sv_${key}">${display}</div>
  </div>`;
}

function recalcFin() {
  // Re-render the current tool
  selectFinTool(S.finTool);
}

// ─── UNIT ECONOMICS ───────────────────────────────────────────────────────────
function renderUnitEconomics() {
  const rev = FIN.avgOrderVal;
  const cogsPct = FIN.cogs / 100;
  const cogs = rev * cogsPct;
  const grossProfit = rev - cogs;
  const grossMargin = (grossProfit / rev) * 100;
  const mktgCostPer = FIN.cac; // per new customer
  const contribMargin = grossProfit - (FIN.mktgSpend / Math.max(1, FIN.revenue / FIN.avgOrderVal) / 12);
  const opexPct = FIN.opex / 100;
  const opexPer = rev * opexPct;
  const netMargin = grossProfit - opexPer;
  const netMarginPct = (netMargin / rev) * 100;
  const unitsToBreakeven = FIN.monthlyBurn / Math.max(1, grossProfit - opexPer);
  const isHealthy = grossMargin > 40;

  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="card">
      <div class="card-head">
        <div class="card-badge" style="color:var(--violet);background:var(--violet-glow);border-color:rgba(167,139,250,.25);">Unit Economics · ⚖️</div>
        <div>
          <div class="card-title">Unit Economics Model</div>
          <div class="card-desc">P&L per rupee of revenue. Every number flows from your inputs — drag sliders to model scenarios.</div>
        </div>
      </div>
      <div class="card-body">

function waterfallBar(label, val, total, color) {
  const pct = Math.min(100, Math.max(0, Math.abs(val / total) * 100));
  return `<div class="waterfall-bar">
    <div class="wb-label">${label}</div>
    <div class="wb-bar-wrap">
      <div class="wb-bar-fill" style="width:${pct}%;background:${color};"></div>
    </div>
    <div class="wb-val">${fmt(val)}</div>
  </div>`;
}

function benchmarkRow(label, target, status) {
  const color = status === 'green' ? 'var(--green)' : status === 'red' ? 'var(--red)' : 'var(--text3)';
  const icon = status === 'green' ? '✓' : status === 'red' ? '✗' : '—';
  return `<div class="fin-row">
    <span class="fin-row-k">${label}</span>
    <span style="font-size:11.5px;color:var(--text3);">${target}</span>
    <span style="color:${color};font-family:'DM Mono',monospace;font-size:12px;">${icon}</span>
  </div>`;
}

function grossMarginBench(gm, low, high) {
  if (gm >= low && gm <= high) return 'green';
  if (gm > high) return 'green';
  return 'red';
}

// ─── CAC / LTV MODEL ─────────────────────────────────────────────────────────
function renderCacLtv() {
  const ltv = FIN.ltv;

  const ratio = ltv / cac;
  const paybackMonths = cac / (FIN.avgOrderVal * (1 - FIN.cogs/100));
  const churn = FIN.churnRate / 100;
  const avgLifetime = 1 / churn; // months
  const impliedLTV = FIN.avgOrderVal * (1 - FIN.cogs/100) * avgLifetime;
  const cohortTable = [1,3,6,12].map(m => {
    const survived = Math.pow(1 - churn, m);
    const revenue = FIN.avgOrderVal * (1 - churn) * ((1 - Math.pow(1-churn, m)) / churn);
    const netVal = revenue * (1 - FIN.cogs/100) - cac;
    return {m, survived: (survived*100).toFixed(0), revenue: Math.round(revenue), netVal: Math.round(netVal)};

        <div class="fin-grid">
          <div class="fin-card" style="${ratio>=3?'border-color:rgba(61,214,140,.3)':'border-color:rgba(255,77,106,.3)'}">
            <div class="fin-card-head"><span class="fin-card-icon">🏆</span><span class="fin-card-title">LTV : CAC Ratio</span></div>
            <div class="fin-val ${ratio>=3?'green':ratio>=2?'gold':'red'}">${ratio.toFixed(1)}x</div>
            <div style="font-size:11.5px;color:var(--text3);margin-top:4px;">
              ${ratio>=3?'✓ Healthy — above 3x threshold. Scale with confidence.':ratio>=2?'⚠ Acceptable — but under pressure. Fix CAC or LTV before scaling.':'✗ Danger zone — every customer you acquire destroys value.'}

            <div class="fin-val">${avgLifetime.toFixed(1)} mo</div>
            <div style="font-size:11.5px;color:var(--text3);margin-top:4px;">At ${fmtPct(FIN.churnRate)} monthly churn</div>

// ─── BREAKEVEN ANALYSIS ───────────────────────────────────────────────────────

  const beUnits = fixedCosts / Math.max(1, contribMarginPerUnit);
  const beRevenue = beUnits * pricePerUnit;
  const currentUnits = FIN.revenue / pricePerUnit;
  const mosUnits = currentUnits - beUnits;
  const mosPct = (mosUnits / Math.max(1, currentUnits)) * 100;
