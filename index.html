// ─── SCENARIO PLANNER ─────────────────────────────────────────────────────────
function renderScenario() {
  const scenarios = {
    bear: {label:'🐻 Bear', growthRate:5,  churn:12, cac:1.5, ltv:0.7,  color:'var(--red)'},
    base: {label:'📊 Base', growthRate:15, churn:6,  cac:1.0, ltv:1.0,  color:'var(--green)'},
    bull: {label:'🐂 Bull', growthRate:30, churn:3,  cac:0.8, ltv:1.3,  color:'var(--gold)'},
  };
  const sc = scenarios[FIN.scenario];
  const gr = 1 + sc.growthRate / 100;
  let rev = FIN.revenue;
  const months = ['M1','M2','M3','M4','M5','M6','M7','M8','M9','M10','M11','M12'];
  const rows = months.map((m,i) => {
    const r = Math.round(rev);
    const cogs = Math.round(r * FIN.cogs / 100);
    const gp = r - cogs;
    const adjCac = FIN.cac * sc.cac;
    const adjMktg = FIN.mktgSpend;
    const ebitda = gp - FIN.opex/100*r - adjMktg - FIN.teamCost - FIN.infraCost;
    rev *= gr;
    return {m, r, gp, ebitda, adjCac};
  });
  const annualRev = rows.reduce((a,r)=>a+r.r,0);
  const annualEBITDA = rows.reduce((a,r)=>a+r.ebitda,0);
  const maxRev = Math.max(...rows.map(r=>r.r));
  const firstProfitMonth = rows.findIndex(r=>r.ebitda>0);

  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="card">
      <div class="card-head">
        <div class="card-badge" style="color:var(--violet);background:var(--violet-glow);border-color:rgba(167,139,250,.25);">Scenario Planner · 🔭</div>
        <div>
          <div class="card-title">Scenario Planner</div>
          <div class="card-desc">Bear / Base / Bull 12-month projections. Know your range before you commit to a plan.</div>
        </div>
      </div>
      <div class="card-body">
        <div class="fin-section-title">🎭 Select Scenario</div>
        <div class="scenario-btns">
          ${Object.entries(scenarios).map(([k,s]) => `
            <div class="scen-btn ${FIN.scenario===k?'active '+k:''}" onclick="FIN.scenario='${k}';renderScenario();">
              <div style="font-size:18px;margin-bottom:4px;">${s.label.split(' ')[0]}</div>
              <div style="font-weight:600;">${s.label.split(' ')[1]}</div>
              <div style="font-size:10px;margin-top:3px;">${s.growthRate}% MoM growth</div>
            </div>`).join('')}
        </div>

        <div class="fin-section-title">📐 Base Inputs</div>
        ${finInputRow('Starting Monthly Revenue', 'revenue', 50000, 10000000, 50000)}
        ${finInputRow('COGS %', 'cogs', 5, 90, 1, '%')}
        ${finInputRow('Monthly Marketing', 'mktgSpend', 10000, 2000000, 10000)}
        ${finInputRow('Monthly Team Cost', 'teamCost', 50000, 5000000, 25000)}

        <div class="fin-section-title">📊 ${sc.label} — Revenue Trajectory</div>
        ${rows.map(r => `
          <div class="waterfall-bar">
            <div class="wb-label">${r.m}</div>
            <div class="wb-bar-wrap">
              <div class="wb-bar-fill" style="width:${(r.r/maxRev*100).toFixed(0)}%;background:${sc.color};opacity:.75;"></div>
            </div>
            <div class="wb-val" style="font-size:11px;">${fmt(r.r)}</div>
          </div>`).join('')}

        <div class="fin-grid" style="margin-top:18px;">
          <div class="fin-card">
            <div class="fin-card-head"><span class="fin-card-icon">📅</span><span class="fin-card-title">Annual Revenue</span></div>
            <div class="fin-val">${fmt(annualRev)}</div>
          </div>
          <div class="fin-card">
            <div class="fin-card-head"><span class="fin-card-icon">📐</span><span class="fin-card-title">Annual EBITDA</span></div>
            <div class="fin-val ${annualEBITDA>0?'green':'red'}">${fmt(annualEBITDA)}</div>
          </div>
          <div class="fin-card">
            <div class="fin-card-head"><span class="fin-card-icon">🏁</span><span class="fin-card-title">First Profitable Month</span></div>
            <div class="fin-val ${firstProfitMonth>=0?'green':'red'}">${firstProfitMonth>=0?'Month '+(firstProfitMonth+1):'Not in Yr 1'}</div>
          </div>
          <div class="fin-card">
            <div class="fin-card-head"><span class="fin-card-icon">📈</span><span class="fin-card-title">MoM Growth Assumed</span></div>
            <div class="fin-val gold">${sc.growthRate}%</div>
          </div>
        </div>

        <div class="fin-section-title">🆚 All Scenarios Side by Side</div>
        <div class="fin-card">
          <div class="fin-row" style="font-weight:600;color:var(--text);">
            <span>Scenario</span><span>Annual Revenue</span><span>Annual EBITDA</span><span>Profit Month</span>
          </div>
          ${Object.entries(scenarios).map(([k,s]) => {
            const g = 1 + s.growthRate/100;
            let r2 = FIN.revenue;
            const rws = months.map(()=>{const rr=Math.round(r2);r2*=g;return rr;});
            const aRev = rws.reduce((a,r)=>a+r,0);
            const aEBITDA = rws.reduce((a,r)=>{
              const cogs=Math.round(r*FIN.cogs/100);
              return a+(r-cogs-FIN.opex/100*r-FIN.mktgSpend-FIN.teamCost-FIN.infraCost);
            },0);
            const fp = rws.findIndex((r,i)=>{
              const cogs=Math.round(r*FIN.cogs/100);
              return (r-cogs-FIN.opex/100*r-FIN.mktgSpend-FIN.teamCost-FIN.infraCost)>0;
            });
            return `<div class="fin-row" style="${k===FIN.scenario?'background:var(--surface3);':''}">
              <span style="color:${s.color};font-weight:600;">${s.label}</span>
              <span class="fin-row-v">${fmt(aRev)}</span>
              <span class="fin-row-v ${aEBITDA>0?'pos':'neg'}">${fmt(aEBITDA)}</span>
              <span class="fin-row-v ${fp>=0?'pos':'neg'}">${fp>=0?'Month '+(fp+1):'Not in Yr 1'}</span>
            </div>`;
          }).join('')}
        </div>

        <div style="margin-top:18px;">
          <button class="btn btn-p" style="background:var(--violet);box-shadow:0 4px 16px rgba(167,139,250,.25);" onclick="runFinAI('scenario')">🤖 Get AI View on Most Likely Scenario →</button>
        </div>
      </div>
    </div>`;
}

// ─── BURN & RUNWAY ────────────────────────────────────────────────────────────
function renderRunway() {
  const totalMonthlyOut = FIN.teamCost + FIN.infraCost + FIN.mktgSpend;
  const monthlyRevCoverage = FIN.revenue * (1 - FIN.cogs/100);
  const netBurn = Math.max(0, totalMonthlyOut - monthlyRevCoverage);
  const runway = netBurn > 0 ? Math.floor(FIN.currentCash / netBurn) : 999;
  const dangerZone = runway < 6;
  const warningZone = runway < 12;

  // Month-by-month cash burn
  const months = ['M1','M2','M3','M4','M5','M6','M7','M8','M9','M10','M11','M12'];
  const gr = 1 + FIN.growthRate / 100;
  let cash = FIN.currentCash;
  let rev = FIN.revenue;
  const cashRows = months.map((m,i) => {
    const r = Math.round(rev);
    const inflow = r * (1 - FIN.cogs/100);
    const outflow = totalMonthlyOut;
    const net = inflow - outflow;
    cash += net;
    rev *= gr;
    return {m, inflow: Math.round(inflow), outflow, net: Math.round(net), cashEnd: Math.round(cash)};
  });
  const runoutMonth = cashRows.findIndex(r => r.cashEnd <= 0);
  const maxCash = Math.max(FIN.currentCash, ...cashRows.map(r=>r.cashEnd));

  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="card">
      <div class="card-head">
        <div class="card-badge" style="color:var(--violet);background:var(--violet-glow);border-color:rgba(167,139,250,.25);">Burn & Runway · 🛫</div>
        <div>
          <div class="card-title">Burn & Runway Calculator</div>
          <div class="card-desc">How long can you survive? Know your number. Raise or cut before it's too late.</div>
        </div>
      </div>
      <div class="card-body">
        <div class="fin-section-title">📐 Cash Position</div>
        ${finInputRow('Cash in Bank / Fund Balance', 'currentCash', 100000, 50000000, 100000)}
        ${finInputRow('Monthly Revenue', 'revenue', 50000, 10000000, 50000)}
        ${finInputRow('Monthly Growth Rate', 'growthRate', 0, 30, 1, '%')}
        ${finInputRow('COGS %', 'cogs', 5, 90, 1, '%')}
        ${finInputRow('Monthly Team Cost', 'teamCost', 25000, 5000000, 25000)}
        ${finInputRow('Monthly Infrastructure', 'infraCost', 5000, 500000, 5000)}
        ${finInputRow('Monthly Marketing', 'mktgSpend', 0, 2000000, 10000)}

        <div class="fin-grid" style="margin-top:4px;">
          <div class="fin-card" style="${dangerZone?'border-color:rgba(255,77,106,.4)':warningZone?'border-color:rgba(245,200,66,.3)':'border-color:rgba(61,214,140,.3)'}">
            <div class="fin-card-head"><span class="fin-card-icon">${dangerZone?'🔴':warningZone?'🟡':'🟢'}</span><span class="fin-card-title">Runway</span></div>
            <div class="fin-val ${dangerZone?'red':warningZone?'gold':'green'}">${runway === 999 ? '∞' : runway + ' mo'}</div>
            <div style="font-size:11.5px;color:var(--text3);margin-top:4px;">${dangerZone?'CRITICAL — Start fundraising or cut costs NOW':warningZone?'Warning — Begin fundraise process. 12 months is minimum runway.':'Healthy — but always be fundraising.'}</div>
          </div>
          <div class="fin-card">
            <div class="fin-card-head"><span class="fin-card-icon">🔥</span><span class="fin-card-title">Net Monthly Burn</span></div>
            <div class="fin-val ${netBurn===0?'green':'red'}">${netBurn===0?'₹0 (Cash flow+)':fmt(netBurn)}</div>
            <div style="font-size:11.5px;color:var(--text3);margin-top:4px;">Revenue covers ${fmtPct(Math.min(100, monthlyRevCoverage/totalMonthlyOut*100))} of outflows</div>
          </div>
          <div class="fin-card">
            <div class="fin-card-head"><span class="fin-card-icon">💸</span><span class="fin-card-title">Total Monthly Outflow</span></div>
            <div class="fin-val">${fmt(totalMonthlyOut)}</div>
            <div style="font-size:11.5px;color:var(--text3);margin-top:4px;">Team ${fmt(FIN.teamCost)} + Infra ${fmt(FIN.infraCost)} + Mktg ${fmt(FIN.mktgSpend)}</div>
          </div>
          <div class="fin-card">
            <div class="fin-card-head"><span class="fin-card-icon">📅</span><span class="fin-card-title">Cash Runs Out</span></div>
            <div class="fin-val ${runoutMonth>=0?'red':'green'}">${runoutMonth>=0?'Month '+(runoutMonth+1):'Beyond Year 1'}</div>
            <div style="font-size:11.5px;color:var(--text3);margin-top:4px;">${runoutMonth>=0?`At ${fmtPct(FIN.growthRate)}% monthly growth rate`:'With current growth, cash lasts through Year 1'}</div>
          </div>
        </div>

        <div class="fin-section-title">📊 Cash Balance — 12-Month Projection</div>
        ${cashRows.map(r => `
          <div class="waterfall-bar">
            <div class="wb-label">${r.m}</div>
            <div class="wb-bar-wrap">
              <div class="wb-bar-fill" style="width:${Math.max(0,(r.cashEnd/maxCash*100)).toFixed(0)}%;background:${r.cashEnd>0?'var(--violet)':'var(--red)'};opacity:.8;"></div>
            </div>
            <div class="wb-val" style="font-size:11px;color:${r.cashEnd>0?'var(--text)':'var(--red)'};">${fmt(r.cashEnd)}</div>
          </div>`).join('')}

        <div class="fin-section-title">🇮🇳 India Fundraising Context</div>
        <div class="fin-card">
          ${benchmarkRow('Fundraise with 18+ months runway', 'Best position', runway>=18?'green':'neutral')}
          ${benchmarkRow('Fundraise with 12 months runway', 'Acceptable', runway>=12?'green':runway>=6?'neutral':'red')}
          ${benchmarkRow('Start process when you have 9 months', 'India VCs take 3-6mo', runway>=9?'green':'red')}
          ${benchmarkRow('Default risk threshold', '<6 months', runway>=6?'green':'red')}
          ${benchmarkRow('Monthly burn (ideal for seed stage)', '<₹25L', totalMonthlyOut<2500000?'green':'neutral')}
        </div>

        <div style="margin-top:18px;">
          <button class="btn btn-p" style="background:var(--violet);box-shadow:0 4px 16px rgba(167,139,250,.25);" onclick="runFinAI('runway')">🤖 Get AI Fundraising & Cost-Cut Strategy →</button>
        </div>
      </div>
    </div>`;
}

// ─── AI ANALYSIS FOR FINANCE TOOLS ───────────────────────────────────────────
async function runFinAI(toolId) {
  if (!getApiKey()) { toast('Enter your OpenRouter key first', 'err'); return; }
  const b = S.brand;
  const brandCtx = b.brand ? `Brand: ${b.brand} | Product: ${b.product} | Model: ${b.bizModel} | Stage: ${b.stage}` : 'No brand set yet.';

  const finSnapshot = `
Financial Inputs:
- Monthly Revenue: ${fmt(FIN.revenue)}
- COGS: ${FIN.cogs}%
- OpEx: ${FIN.opex}%
- CAC: ${fmt(FIN.cac)}
- LTV: ${fmt(FIN.ltv)}
- Avg Order Value: ${fmt(FIN.avgOrderVal)}
- Monthly Churn: ${FIN.churnRate}%
- Team Cost: ${fmt(FIN.teamCost)}/mo
- Marketing Spend: ${fmt(FIN.mktgSpend)}/mo
- Infrastructure: ${fmt(FIN.infraCost)}/mo
- Cash in Bank: ${fmt(FIN.currentCash)}
- Monthly Growth Rate: ${FIN.growthRate}%
LTV:CAC Ratio: ${(FIN.ltv/FIN.cac).toFixed(2)}x
Gross Margin: ${(100-FIN.cogs).toFixed(0)}%
Net Burn: ~${fmt(Math.max(0, FIN.teamCost+FIN.infraCost+FIN.mktgSpend - FIN.revenue*(1-FIN.cogs/100)))}/mo
`;

  const toolPrompts = {
    unit_econ: `Analyze these unit economics for an Indian startup and provide:\n## Verdict on Unit Economics Health\nIs this business model viable at scale? Direct answer.\n\n## Top 3 Levers to Improve Margins\nSpecific, actionable — ranked by impact. Include India-specific tactics (negotiating with Indian distributors, kirana trade margins, import duty on COGS, etc.)\n\n## The One Number to Fix First\nIf they can only improve ONE metric, what is it and how?\n\n## India-Specific Margin Reality\nWhat do margins actually look like for comparable Indian businesses in this category? What's the benchmark?\n\n## Brutal Truth\n2 hard realities about this cost structure.`,
    p_and_l: `Analyze this 12-month P&L projection for an Indian startup and provide:\n## P&L Quality Assessment\nIs this trajectory credible? Where are the assumptions most vulnerable?\n\n## Revenue Quality\nIs the growth rate realistic for this category in India? Comp to peer companies.\n\n## Cost Structure Opinion\nWhat's too high? What's under-invested? Specific line items.\n\n## The Profitability Path\nExact steps to reach EBITDA positive — in order of priority.\n\n## Brutal Truth\n2 things this P&L is hiding or not accounting for.`,
    cac_ltv: `Analyze this CAC/LTV model for an Indian startup:\n## LTV:CAC Assessment\nIs the ratio healthy for this business model? What does it mean for growth strategy?\n\n## How to Lower CAC in India\n3 specific tactics for the Indian market — include channel-specific benchmarks.\n\n## How to Increase LTV in India\n3 specific retention tactics calibrated to Indian consumer/buyer behavior.\n\n## Payback Period Reality Check\nIs the payback period manageable given typical Indian startup fundraising cycles?\n\n## Brutal Truth\n2 hard realities about this cohort economics.`,
    breakeven: `Analyze this breakeven model for an Indian startup:\n## Time-to-Breakeven Assessment\nIs this timeline realistic? What's achievable in the Indian market context?\n\n## Top 3 Ways to Reach Breakeven Faster\nSpecific to this business model — include India-specific options (government schemes, distributor credit terms, bulk purchasing for COGS reduction, etc.)\n\n## Fixed Cost Reduction Opportunities\nWhich fixed costs are cuttable without damaging growth? Be specific.\n\n## Revenue Acceleration Tactics\nHow to increase revenue faster to hit breakeven — 3 India-specific moves.\n\n## Brutal Truth\n2 things founders typically miss about their breakeven calculation.`,
    scenario: `Analyze these scenario projections for an Indian startup:\n## Most Likely Scenario\nBear/Base/Bull — which is most realistic and why, given India market conditions?\n\n## Key Assumptions to Watch\nWhat 3 variables, if wrong, flip the entire projection?\n\n## India-Specific Risk Factors\nWhat could push this toward the Bear scenario that founders often don't model?\n\n## Upside Catalysts\nWhat India-specific events could push toward Bull scenario?\n\n## Brutal Truth\n2 things about the projections that need revisiting.`,
    runway: `Analyze this burn and runway situation for an Indian startup:\n## Runway Assessment\nIs this runway safe? What's the real risk given Indian fundraising timelines?\n\n## Immediate Cost-Cut Recommendations\nIf they need to extend runway by 6 months without killing growth — what to cut?\n\n## Indian Fundraising Reality\nGiven this burn rate and stage, what is the fundraising path? VC, angels, revenue-based financing, government grants (Startup India, SIDBI)?\n\n## The 90-Day Plan to Extend Runway\n3 specific actions in the next 90 days.\n\n## Brutal Truth\n2 hard truths about this cash position.`,
  };

  const prompt2 = `${brandCtx}\n\n${finSnapshot}\n\n${toolPrompts[toolId] || 'Analyze these financials and provide strategic recommendations for an Indian startup.'}`;

  const c = document.getElementById('content');
  // Find or append response box
  let rbox = document.getElementById('finAIResponse');
  if (!rbox) {
    rbox = document.createElement('div');
    rbox.id = 'finAIResponse';
    rbox.className = 'rbox';
    rbox.style.marginTop = '18px';
    c.querySelector('.card-body')?.appendChild(rbox);
  }
  rbox.innerHTML = `<div class="loading"><div class="spin"></div><div><div class="ltxt">BrandOS Financial Advisor analyzing...</div><div class="lsub">Applying India market intelligence to your numbers</div></div></div>`;
  rbox.scrollIntoView({behavior:'smooth', block:'start'});

  try {
    const out = await callAI(prompt2, SYSPROMPT);
    rbox.innerHTML = `
      <div class="rhead">
        <div class="rlabel">Financial Analysis — ${FIN_TOOLS_META.find(t=>t.id===toolId)?.label}</div>
        <button class="btn btn-g" style="font-size:11.5px;padding:5px 12px;" onclick="selectFinTool('${toolId}')">Recalculate ↺</button>
      </div>
      <div class="rcontent">${md(out)}</div>`;
  } catch(err) {
    rbox.innerHTML = `<div style="color:var(--red);padding:14px;">Error: ${escHtml(err.message)}</div>`;
  }
}

// ── FINANCIAL MODEL ENGINE END ─────────────────────────────────────────────────

// ── INIT ───────────────────────────────────────────────────────────────────────
const didRestore = loadState();
renderSidebar();
if (didRestore && S.brand.brand) {
  // Restore to where they left off
  if (S.mode === 'execution') showExecEngine();
  else if (S.mode === 'solver') showSolver();
  else if (S.mode === 'finance') showFinanceEngine();
  else if (S.mode === 'research') showResearchEngine();
  else if (S.step > 0) goStep(S.step);
  else showWelcome();
  setTimeout(() => toast('Welcome back, ' + S.brand.brand + ' ✓', 'ok'), 400);
} else {
  showWelcome();
}
</script>
