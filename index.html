<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrandOS — Indian Marketing Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0b;--s1:#111114;--s2:#1a1a1f;--s3:#22222a;--b1:#2a2a35;--b2:#383844;--acc:#ff6b2b;--acc2:#ff9f5a;--glow:rgba(255,107,43,0.12);--gold:#f5c842;--tx:#f0eff5;--tx2:#9090a0;--tx3:#555560;--grn:#3dd68c;--red:#ff4d6a;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;overflow:hidden;}
.app{display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
.sb{width:240px;min-width:240px;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;height:100vh;}
.logo{padding:20px 18px 16px;border-bottom:1px solid var(--b1);flex-shrink:0;}
.logo-t{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;}
.logo-t span{color:var(--acc);}
.logo-s{font-size:10.5px;color:var(--tx3);font-family:'DM Mono',monospace;margin-top:3px;letter-spacing:.07em;text-transform:uppercase;}
.steps{flex:1;overflow-y:auto;padding:8px 0;}
.steps::-webkit-scrollbar{width:3px;}
.steps::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}
.si{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;}
.si:hover{background:var(--s2);}
.si.active{background:var(--glow);border-left-color:var(--acc);}
.si.done{opacity:1;}
.sn{width:22px;height:22px;border-radius:50%;background:var(--s3);border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;color:var(--tx3);flex-shrink:0;}
.si.active .sn{background:var(--acc);color:#fff;border-color:var(--acc);}
.si.done .sn{background:var(--grn);color:#000;border-color:var(--grn);}
.sl{font-size:12px;color:var(--tx2);line-height:1.3;}
.si.active .sl{color:var(--tx);font-weight:500;}
.sb-foot{padding:12px 16px;border-top:1px solid var(--b1);flex-shrink:0;font-size:11px;color:var(--tx3);font-family:'DM Mono',monospace;display:flex;align-items:center;gap:7px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--grn);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.tb{padding:12px 26px;border-bottom:1px solid var(--b1);background:var(--s1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tb-l{font-family:'Syne',sans-serif;font-size:13.5px;font-weight:700;color:var(--tx2);}
.tb-l b{color:var(--acc);}
.badge{font-family:'DM Mono',monospace;font-size:10.5px;padding:3px 9px;border-radius:20px;background:var(--s3);border:1px solid var(--b2);color:var(--tx3);}
.badge.on{color:var(--gold);border-color:rgba(245,200,66,.3);background:rgba(245,200,66,.07);}

.content{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:20px;min-height:0;}
.content::-webkit-scrollbar{width:5px;}
.content::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px;}

.botnav{padding:12px 26px;border-top:1px solid var(--b1);background:var(--s1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.ni{font-size:11px;color:var(--tx3);font-family:'DM Mono',monospace;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;}
.bp{background:var(--acc);color:#fff;}
.bp:hover{background:var(--acc2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,107,43,.3);}
.bg{background:var(--s2);border:1px solid var(--b2);color:var(--tx2);}
.bg:hover{border-color:var(--b1);color:var(--tx);}

/* CARD */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:13px;}
.ch{padding:16px 20px;border-bottom:1px solid var(--b1);display:flex;align-items:flex-start;gap:12px;}
.cbadge{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--acc);background:var(--glow);border:1px solid rgba(255,107,43,.2);padding:3px 8px;border-radius:6px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.ct{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;}
.cd{font-size:12.5px;color:var(--tx2);margin-top:3px;line-height:1.5;}
.cb{padding:20px;}

/* FORM */
label{display:block;font-size:12.5px;color:var(--tx2);margin-bottom:6px;font-weight:500;}
label span{color:var(--acc);}
input[type=text],textarea,select{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:10px 13px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s;resize:vertical;}
input:focus,textarea:focus,select:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--glow);}
select option{background:var(--s2);}
.fr{margin-bottom:16px;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:16px;}

/* OUTPUT */
.out{background:var(--s2);border:1px solid var(--b1);border-radius:11px;padding:20px;margin-top:16px;}
.out-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--b1);}
.out-label{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--grn);display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.07em;}
.out-label::before{content:'';display:block;width:5px;height:5px;border-radius:50%;background:var(--grn);}
.out-body{font-size:13.5px;line-height:1.9;color:var(--tx);}
.out-body h2{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--acc);margin:0 0 14px;}
.out-body h3{font-family:'Syne',sans-serif;font-size:14.5px;font-weight:700;color:var(--tx);margin:20px 0 8px;padding-top:14px;border-top:1px solid var(--b1);}
.out-body h4{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--acc2);margin:14px 0 6px;}
.out-body strong{color:var(--acc2);font-weight:600;}
.out-body em{color:var(--gold);font-style:normal;}
.out-body ul{padding-left:18px;margin:8px 0;}
.out-body li{margin:5px 0;}
.out-body p{margin:8px 0;}
.out-body table{width:100%;border-collapse:collapse;margin:12px 0;font-size:12.5px;}
.out-body th{background:var(--s3);padding:7px 11px;text-align:left;font-weight:600;border:1px solid var(--b2);color:var(--acc2);}
.out-body td{padding:6px 11px;border:1px solid var(--b2);color:var(--tx2);}
.out-body hr{border:none;border-top:1px solid var(--b1);margin:16px 0;}
.out-body .brutal{background:rgba(255,77,106,.08);border:1px solid rgba(255,77,106,.2);border-radius:8px;padding:14px 16px;margin-top:16px;}
.out-body .brutal h4{color:var(--red);margin-top:0;}

/* CTX */
.ctx{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:14px 18px;display:flex;gap:24px;flex-wrap:wrap;}
.cx{display:flex;flex-direction:column;gap:2px;}
.ck{font-size:10.5px;color:var(--tx3);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.05em;}
.cv{font-size:13px;color:var(--tx);}

/* CHIPS */
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;}
.chip{font-size:11px;font-family:'DM Mono',monospace;padding:3px 9px;border-radius:5px;background:var(--s3);border:1px solid var(--b2);color:var(--tx3);}
.chip.g{color:var(--grn);border-color:rgba(61,214,140,.2);background:rgba(61,214,140,.06);}
.chip.o{color:var(--acc);border-color:rgba(255,107,43,.2);background:var(--glow);}
.chip.gd{color:var(--gold);border-color:rgba(245,200,66,.2);background:rgba(245,200,66,.06);}

/* SCORE */
.score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:16px 0;}
.sc{background:var(--s3);border:1px solid var(--b2);border-radius:10px;padding:14px 10px;text-align:center;}
.sc-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--acc);}
.sc-lbl{font-size:10.5px;color:var(--tx3);margin-top:4px;line-height:1.3;}
.score-total{text-align:center;padding:16px;background:var(--glow);border:1px solid rgba(255,107,43,.25);border-radius:10px;margin-top:8px;}
.score-total .big{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;color:var(--acc);}
.score-total .verdict{font-size:13px;color:var(--tx2);margin-top:4px;}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--s1);border:1px solid var(--b2);border-radius:8px;padding:11px 16px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:999;transform:translateY(14px);opacity:0;transition:all .25s;max-width:280px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok{border-color:rgba(61,214,140,.3);}

@media print{.sb,.tb,.botnav,.btn{display:none!important;}.main{width:100%;}.content{padding:16px;}body{background:#fff;color:#000;}.out{background:#f9f9f9;border:1px solid #ddd;}.out-body h3{border-top:1px solid #ddd;color:#000;}.out-body h2{color:#ff6b2b;}}
</style>
</head>
<body>
<div class="app">
<aside class="sb">
  <div class="logo">
    <div class="logo-t">Brand<span>OS</span></div>
    <div class="logo-s">Indian Marketing Intelligence</div>
  </div>
  <div class="steps" id="sbSteps"></div>
  <div class="sb-foot"><div class="dot"></div>No API needed · 100% Free</div>
</aside>
<main class="main">
  <div class="tb">
    <div class="tb-l">Step <b id="tStep">1</b> · <span id="tName">Brand Brief</span></div>
    <div class="badge on" id="tBadge">Stage not set</div>
  </div>
  <div class="content" id="content"></div>
  <div class="botnav">
    <button class="btn bg" id="bPrev" onclick="nav(-1)">← Prev</button>
    <div class="ni" id="ni">Step 1 of 13</div>
    <button class="btn bg" id="bNext" onclick="nav(1)">Next →</button>
  </div>
</main>
</div>
<div class="toast" id="toast"></div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
const S = {
  step: 1,
  done: new Set(),
  b: {}, // brand data
  out: {}, // step outputs
  stage: ''
};

const STEPS = [
  'Brand Brief Intake','Consumer Personas','MarketFit Score',
  'TAM / SAM / SOM','Competitor Map','Framework Battery',
  'Challenger Positioning','PriceSense','GTM 90-Day Plan',
  'Budget Allocator','Risk Flags','Open Q&A','Final Report'
];

// ─── SIDEBAR ──────────────────────────────────────────────────────────────────
function renderSB() {
  document.getElementById('sbSteps').innerHTML = STEPS.map((l,i) => {
    const n = i+1;
    return `<div class="si ${S.step===n?'active':''} ${S.done.has(n)?'done':''}" onclick="goStep(${n})">
      <div class="sn">${S.done.has(n)?'✓':n}</div>
      <div class="sl">${l}</div>
    </div>`;
  }).join('');
  document.getElementById('tStep').textContent = S.step;
  document.getElementById('tName').textContent = STEPS[S.step-1];
  document.getElementById('ni').textContent = `Step ${S.step} of 13`;
  document.getElementById('tBadge').className = 'badge' + (S.stage?' on':'');
  document.getElementById('tBadge').textContent = S.stage || 'Stage not set';
  document.getElementById('bPrev').style.visibility = S.step<=1?'hidden':'visible';
  document.getElementById('bNext').style.visibility = S.step>=13?'hidden':'visible';
}

function nav(d) { const n=S.step+d; if(n>=1&&n<=13) goStep(n); }

function goStep(n) {
  S.step = n; renderSB();
  const fns = [s1,s2,s3,s4,s5,s6,s7,s8,s9,s10,s11,s12,s13];
  fns[n-1]();
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function v(id){const e=document.getElementById(id);return e?e.value.trim():'';}
function set(html){document.getElementById('content').innerHTML=html; document.getElementById('content').scrollTop=0;}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.className='toast ok show';setTimeout(()=>t.className='toast',3000);}
function ctxBar(){
  if(!S.b.brand) return '';
  return `<div class="ctx">
    <div class="cx"><div class="ck">Brand</div><div class="cv">${S.b.brand}</div></div>
    <div class="cx"><div class="ck">Stage</div><div class="cv">${S.stage||'—'}</div></div>
    <div class="cx"><div class="ck">Location</div><div class="cv">${S.b.loc||'—'}</div></div>
    <div class="cx"><div class="ck">Revenue</div><div class="cv">${S.b.rev||'—'}</div></div>
  </div>`;
}
function outBox(title, html) {
  return `<div class="out">
    <div class="out-head"><div class="out-label">${title}</div>
    <button class="btn bg" style="font-size:11px;padding:4px 10px;" onclick="window.print()">🖨️ Print</button></div>
    <div class="out-body">${html}</div>
  </div>`;
}

// ─── STEP 1: BRAND BRIEF ──────────────────────────────────────────────────────
function s1() {
  const prev = S.out[1] ? outBox('Brand Analysis', S.out[1]) : '';
  set(`<div class="card">
    <div class="ch"><div class="cbadge">Step 1 · 📋</div><div>
      <div class="ct">Brand Brief Intake</div>
      <div class="cd">Tell BrandOS everything. The more detail, the sharper every step that follows.</div>
    </div></div>
    <div class="cb">
      <div class="fg">
        <div class="fr"><label>Brand Name <span>*</span></label>
          <input type="text" id="f1" value="${S.b.brand||'MP Sharbati Atta'}"></div>
        <div class="fr"><label>Brand Stage <span>*</span></label>
          <select id="f2">
            <option value="">Select...</option>
            <option value="Stage 1 — New Idea" ${S.b.stage?.includes('1')?'selected':''}>Stage 1 — New Idea (pre-revenue)</option>
            <option value="Stage 2 — Early Brand" ${(!S.b.stage||S.b.stage?.includes('2'))?'selected':''}>Stage 2 — Early Brand (some sales)</option>
            <option value="Stage 3 — Established" ${S.b.stage?.includes('3')?'selected':''}>Stage 3 — Established (scaling)</option>
          </select></div>
      </div>
      <div class="fr"><label>Product Description <span>*</span></label>
        <textarea id="f3" rows="2">${S.b.prod||'Premium MP Sharbati wheat atta — single-origin, stone-ground, zero additives or bleaching'}</textarea></div>
      <div class="fg">
        <div class="fr"><label>Geography / Launch Market</label>
          <input type="text" id="f4" value="${S.b.loc||'Delhi NCR, targeting North India'}"></div>
        <div class="fr"><label>Current Annual Revenue</label>
          <input type="text" id="f5" value="${S.b.rev||'₹10 crore'}"></div>
      </div>
      <div class="fr"><label>Target Customer</label>
        <input type="text" id="f6" value="${S.b.target||'Health-conscious homemakers, SEC A/B, 28-45 yrs, Delhi NCR'}"></div>
      <div class="fr"><label>Current Channels</label>
        <input type="text" id="f7" value="${S.b.ch||'Local kirana, some DMart'}"></div>
      <div class="fr"><label>Your USP — Why choose you over Aashirvaad?</label>
        <textarea id="f8" rows="2">${S.b.usp||'Single-origin MP Sharbati wheat, traditional stone grinding, zero additives — visibly different taste'}</textarea></div>
      <div class="fr"><label>Monthly Marketing Budget</label>
        <input type="text" id="f9" value="${S.b.budget||'₹5-8 lakh/month'}"></div>
      <div class="fr"><label>Key Competitors / Anything else</label>
        <textarea id="f10" rows="2">${S.b.notes||'Main competitor Aashirvaad (ITC) ~60% packaged atta share. Also Pillsbury, Fortune.'}</textarea></div>
      <div style="margin-top:18px;"><button class="btn bp" onclick="run1()">Generate Brand Analysis →</button></div>
    </div>
  </div>${prev}`);
}

function run1() {
  const brand=v('f1'), stage=v('f2');
  if(!brand||!stage){toast('Fill brand name and stage');return;}
  S.b = {brand,stage,prod:v('f3'),loc:v('f4'),rev:v('f5'),target:v('f6'),ch:v('f7'),usp:v('f8'),budget:v('f9'),notes:v('f10')};
  S.stage = stage;
  renderSB();

  const stageNum = stage.includes('1')?1:stage.includes('2')?2:3;
  const stageAdvice = stageNum===1
    ? 'Focus on validation first — find 100 customers before spending on marketing.'
    : stageNum===2
    ? 'You have PMF signals. Now build distribution depth before going wide.'
    : 'Scale what works. Do not rebuild what already has traction.';

  const html = `<h2>${brand} — Brand Analysis</h2>
<h3>Brand Snapshot</h3>
<p><strong>${brand}</strong> is a ${S.b.prod} brand targeting ${S.b.target} in ${S.b.loc}. Currently at ${S.b.rev} revenue, operating through ${S.b.ch}.</p>

<h3>The Real Opportunity</h3>
<p>Indian packaged atta is a <strong>₹25,000+ crore market</strong> dominated by Aashirvaad with ~60% share — but dominated on distribution, not quality. There is a clear white space for a <strong>provenance-led, quality-first brand</strong> targeting SEC A/B consumers who are willing to pay a premium for traceability and health credentials. The opportunity is not to beat Aashirvaad at their game — it is to own the <em>premium artisanal atta</em> position they have deliberately vacated.</p>

<h3>Initial Positioning Hypothesis</h3>
<p>Position as <strong>"The atta that tastes like your grandmother's"</strong> — nostalgia + quality + origin story. The Sharbati wheat of Madhya Pradesh is a legitimate differentiator with a story to tell. Stone-grinding is a verifiable process claim. This is a brand that can charge <strong>₹80-120 per kg</strong> vs Aashirvaad's ₹35-45 without apology.</p>

<h3>Three Critical Questions</h3>
<ul>
  <li>Can you guarantee consistent sourcing from the same Sharbati wheat belt farmers — this is your moat?</li>
  <li>What is your cost of production per kg and what gross margin does ₹80-100/kg give you?</li>
  <li>Do you have distribution relationships in Delhi NCR kirana or are you starting from zero?</li>
</ul>

<h3>Stage Assessment — ${stage}</h3>
<p>${stageAdvice}</p>

<div class="brutal">
  <h4>⚡ Brutal Truths</h4>
  <ul>
    <li><strong>Aashirvaad is not your real enemy.</strong> Your real enemy is consumer inertia — people buy atta on autopilot. You need a reason so strong it breaks a decade-old habit.</li>
    <li><strong>Taste is not enough.</strong> Every premium atta brand says it tastes better. You need a proof mechanism — farm visits, QR codes to the source farm, third-party nutrition tests.</li>
    <li><strong>Delhi NCR kirana is expensive to crack.</strong> Distributor margins of 8-10% + retailer margins of 15-18% + promoter costs will eat your margin if your MRP is not set correctly from Day 1.</li>
  </ul>
</div>`;

  S.out[1] = html; S.done.add(1); renderSB(); s1();
  toast('Step 1 complete! ✓');
}

// ─── STEP 2: PERSONAS ─────────────────────────────────────────────────────────
function s2() {
  const prev = S.out[2] ? outBox('Consumer Personas', S.out[2]) : '';
  set(`${ctxBar()}<div class="card">
    <div class="ch"><div class="cbadge">Step 2 · 👤</div><div>
      <div class="ct">Indian Consumer Persona Builder</div>
      <div class="cd">3 real Indian personas with purchase triggers, cultural context, and channel behaviour.</div>
    </div></div>
    <div class="cb">
      <div class="fr"><label>Any specific segment to focus on? (optional)</label>
        <input type="text" id="p1" placeholder="e.g., working women Tier 2, health-conscious men 30-40..."></div>
      <div style="margin-top:16px;"><button class="btn bp" onclick="run2()">Build Personas →</button></div>
    </div>
  </div>${prev}`);
}

function run2() {
  if(!S.b.brand){toast('Complete Step 1 first');return;}
  const brand = S.b.brand;
  const html = `<h2>${brand} — Consumer Personas</h2>

<h3>Persona 1: Priya Sharma — The Conscious Urban Mom</h3>
<p><strong>35 years | South Delhi | SEC A2 | HHI ₹18L/year | Nuclear family of 4</strong></p>
<h4>Daily Life</h4>
<p>Wakes at 6am, makes rotis for school tiffins. Uses Blinkit/Zepto for daily groceries. Reads ingredient labels. Follows nutrition influencers on Instagram. Already switched to organic vegetables — atta is the next frontier.</p>
<h4>Purchase Trigger</h4>
<p>A Reels video showing stone-grinding process + a dietitian she follows mentions Sharbati wheat's low GI. She orders a 5kg trial on Blinkit same day.</p>
<h4>Price Sensitivity</h4>
<p>Will pay <strong>₹95-120 for 5kg</strong> without hesitation if quality is verified. Price is not the objection — <em>proof</em> is.</p>
<h4>Channel</h4><p>Primarily Blinkit/Zepto (quick commerce). Also Amazon Subscribe & Save for regular orders.</p>
<h4>The Non-Obvious Insight</h4>
<p>She doesn't want to feel guilty. She buys premium atta not just for health — but so she can tell herself she's being a good mother. The emotional job is <em>absolution</em>.</p>

<h3>Persona 2: Rakesh Gupta — The Value-Seeker</h3>
<p><strong>42 years | Janakpuri, West Delhi | SEC B1 | HHI ₹8L/year | Joint family of 6</strong></p>
<h4>Daily Life</h4>
<p>Buys atta from the neighbourhood kirana once a week — always the same brand his wife tells him to. 10kg pack. Looks at the price per kg. Brand switched once when kirana ran out and he liked the alternative.</p>
<h4>Purchase Trigger</h4>
<p>Kirana owner recommends a new brand ("saab, ye wali bahut achhi hai, customers baar baar maang rahe hain"). Free 500g sample convinces the family. Wife approves the taste. Habit switched in 2 weeks.</p>
<h4>Price Sensitivity</h4>
<p>Ceiling at <strong>₹65-75 for 5kg</strong>. Above that needs active justification to wife.</p>
<h4>Channel</h4><p>Kirana store exclusively. Will not order groceries online.</p>
<h4>The Non-Obvious Insight</h4>
